<script src="../assets/govbb-framework.js"></script>
<script>
const FORM_NAME = 'Direct Deposit Form';

const BENEFIT_OPTIONS = [
  'Old-Age Pension', 'Sickness Benefit', 'Maternity Benefit',
  'Unemployment Benefit', 'Invalidity Benefit', 'Survivors Benefit', 'Other'
];

const INSTITUTION_OPTIONS = [
  'Barbados National Bank', 'First Citizens Bank', 'RBC Royal Bank',
  'Scotiabank', 'CIBC FirstCaribbean', 'Butterfield Bank',
  'Republic Bank', 'Cave Shepherd Financial Services', 'Other'
];

function getFlow() {
  if (GovBB.D['alt-payee'] === 'Yes') {
    return ['start','claimant-details','benefit-type','alternate-payee','financial-institution','declaration','check','confirmation'];
  }
  return ['start','claimant-details','benefit-type','financial-institution','declaration','check','confirmation'];
}

const PAGES = {
  'start': () => `
    <div class="space-y-8">
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Set up direct deposit for your NIS benefit</h1>
      <p class="text-[1.25rem]">Use this form to have your NIS benefit paid directly into your bank account. This is the fastest and safest way to receive your payments.</p>
      <div class="bg-bb-yellow-10 border-l-4 border-bb-yellow-00 p-4">
        <p class="font-bold">Before you start</p>
        <p>You must already be receiving an NIS benefit to use this form.</p>
      </div>
      <div>
        <h2 class="font-bold text-[1.5rem] mb-4">What you will need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
          <li>Your NIS number</li>
          <li>Your National Registration Number (NRN)</li>
          <li>Your bank account details (account number, branch name)</li>
          <li>A recent bank statement header showing your name and account number</li>
          <li>Details of any alternate payee (if you want someone else to receive payments on your behalf)</li>
        </ul>
      </div>
      ${GovBB.startBtn()}
    </div>`,

  'claimant-details': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your personal details</h1>
      <div class="space-y-8">
        ${GovBB.textField('first-name', 'First name')}
        ${GovBB.textField('middle-name', 'Middle name(s)', { hint: 'Optional' })}
        ${GovBB.textField('last-name', 'Last name')}
        ${GovBB.textField('nis-number', 'NIS number', { hint: 'Your 6-digit National Insurance number', inputmode: 'numeric', maxlength: '6' })}
        ${GovBB.textField('nrn', 'National Registration Number (NRN)', { hint: 'For example, 870315-1234' })}
        ${GovBB.textField('tamis-number', 'TAMIS number', { hint: 'Optional — only if you have one' })}
        <h2 class="font-bold text-[1.5rem]">Your address</h2>
        ${GovBB.textField('street-address', 'Street address')}
        ${GovBB.textField('district', 'District', { hint: 'Optional' })}
        ${GovBB.selectField('parish', 'Parish', GovBB.PARISHES)}
        ${GovBB.textField('postal-code', 'Postal code', { hint: 'For example, BB11000' })}
        <h2 class="font-bold text-[1.5rem]">Your contact details</h2>
        ${GovBB.emailField('contact-email', 'Email address')}
        ${GovBB.telField('telephone', 'Telephone number', { hint: 'Include area code. For example, 246-555-1234', placeholder: '246-555-1234' })}
        ${GovBB.telField('cellular', 'Mobile number', { hint: 'Include area code. For example, 246-555-1234', placeholder: '246-555-1234' })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'benefit-type': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your benefit details</h1>
      <div class="space-y-8">
        ${GovBB.selectField('benefit-type', 'What type of NIS benefit do you receive?', BENEFIT_OPTIONS)}
        ${GovBB.D['benefit-type'] === 'Other' ? GovBB.textField('benefit-type-other', 'Please describe your benefit') : ''}
        ${GovBB.radioGroup('alt-payee', 'Do you want someone else to receive payments on your behalf?', ['Yes', 'No'], { hint: 'This is called an alternate payee.' })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'alternate-payee': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Alternate payee details</h1>
      <p class="text-[1.25rem] text-bb-mid-grey-00 mb-8">An alternate payee is someone who can receive your NIS benefit on your behalf.</p>
      <div class="space-y-8">
        <h2 class="font-bold text-[1.5rem]">Alternate payee's name</h2>
        ${GovBB.textField('ap-first-name', 'First name')}
        ${GovBB.textField('ap-middle-name', 'Middle name(s)', { hint: 'Optional' })}
        ${GovBB.textField('ap-last-name', 'Last name')}
        <h2 class="font-bold text-[1.5rem]">Alternate payee's personal details</h2>
        ${GovBB.textField('ap-nis-number', 'NIS number', { hint: 'Their 6-digit National Insurance number', inputmode: 'numeric', maxlength: '6' })}
        ${GovBB.textField('ap-nrn', 'National Registration Number (NRN)', { hint: 'For example, 870315-1234' })}
        ${GovBB.textField('ap-tamis-number', 'TAMIS number', { hint: 'Optional' })}
        <h2 class="font-bold text-[1.5rem]">Alternate payee's address</h2>
        ${GovBB.textField('ap-street-address', 'Street address')}
        ${GovBB.textField('ap-district', 'District', { hint: 'Optional' })}
        ${GovBB.selectField('ap-parish', 'Parish', GovBB.PARISHES)}
        ${GovBB.textField('ap-postal-code', 'Postal code', { hint: 'For example, BB11000' })}
        <h2 class="font-bold text-[1.5rem]">Alternate payee's contact details</h2>
        ${GovBB.telField('ap-telephone', 'Telephone number', { hint: 'Include area code', placeholder: '246-555-1234' })}
        ${GovBB.telField('ap-cellular', 'Mobile number', { hint: 'Include area code', placeholder: '246-555-1234' })}
        ${GovBB.radioGroup('ap-empowered', 'Are you legally empowered to act on behalf of this person?', ['Yes', 'No'], { hint: 'For example, you have a power of attorney.' })}
        ${GovBB.D['ap-empowered'] === 'Yes' ? `
          <div>
            <p class="block text-[1.25rem] leading-normal font-bold text-bb-black-00 mb-2">Upload proof of empowerment</p>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mb-2">Upload a JPG, PNG or PDF file under 5MB.</p>
            <input type="file" id="ap-proof-file" accept=".jpg,.jpeg,.png,.pdf" class="block w-full text-[1.25rem] file:mr-4 file:py-2 file:px-4 file:rounded-sm file:border-2 file:border-bb-black-00 file:text-sm file:font-semibold file:bg-bb-white-00 file:text-bb-black-00 hover:file:bg-bb-blue-10 cursor-pointer">
          </div>` : ''}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'financial-institution': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your bank account details</h1>
      <div class="space-y-8">
        ${GovBB.textField('account-holder-name', 'Name(s) on the account', { hint: 'Enter the name(s) exactly as they appear on your bank statement.' })}
        ${GovBB.selectField('financial-institution', 'Financial institution', INSTITUTION_OPTIONS)}
        ${GovBB.D['financial-institution'] === 'Other' ? GovBB.textField('institution-other', 'Name of financial institution') : ''}
        ${GovBB.textField('account-number', 'Account number', { inputmode: 'numeric' })}
        ${GovBB.textField('branch-name', 'Branch name', { hint: 'For example, Bridgetown Branch' })}
        ${GovBB.textField('branch-transit', 'Branch or transit number', { hint: 'Optional — you can find this on your bank statement.' })}
        <div>
          <p class="block text-[1.25rem] leading-normal font-bold text-bb-black-00 mb-2">Upload bank statement header</p>
          <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mb-2">Upload a copy of the top section of a recent bank statement showing your name and account number. Accepted formats: JPG, PNG or PDF under 5MB.</p>
          <input type="file" id="bank-statement-file" accept=".jpg,.jpeg,.png,.pdf" class="block w-full text-[1.25rem] file:mr-4 file:py-2 file:px-4 file:rounded-sm file:border-2 file:border-bb-black-00 file:text-sm file:font-semibold file:bg-bb-white-00 file:text-bb-black-00 hover:file:bg-bb-blue-10 cursor-pointer">
        </div>
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'declaration': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Declaration</h1>
      <div class="space-y-8">
        <div class="space-y-2 mb-6">
          <p class="text-[1.25rem]"><span class="font-bold">Applicant's name:</span> ${[GovBB.D['first-name'], GovBB.D['middle-name'], GovBB.D['last-name']].filter(Boolean).join(' ') || '—'}</p>
          <p class="text-[1.25rem]"><span class="font-bold">Date:</span> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
        </div>
        <div class="bg-bb-blue-10 border-l-4 border-bb-blue-40 p-6">
          <p class="text-[1.25rem]">I, <strong>${[GovBB.D['first-name'], GovBB.D['middle-name'], GovBB.D['last-name']].filter(Boolean).join(' ') || 'the claimant'}</strong>, authorise the National Insurance Office to pay my NIS benefit directly into the bank account stated in this form. I understand that I must notify NIS immediately if my bank details change.</p>
          <p class="text-[1.25rem] mt-4">I declare that the information provided is true and correct to the best of my knowledge.</p>
        </div>
        ${GovBB.checkboxItem('declaration-agree', 'I confirm that the information I have given is true and complete to the best of my knowledge.')}
        <div class="mt-8 flex gap-4">
          <button type="button" onclick="back()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-colors duration-200 outline-none bg-bb-grey-00 text-bb-black-00 hover:bg-[#c5ccd4] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Back</button>
          <button type="button" onclick="next()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] hover:shadow-[inset_0_0_0_4px_rgba(222,245,246,0.10)] active:bg-[#0a4549] active:shadow-[inset_0_0_0_3px_rgba(0,0,0,0.20)] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Submit authorisation</button>
        </div>
      </div>
    </form>`,

  'check': () => {
    const hasAltPayee = GovBB.D['alt-payee'] === 'Yes';
    return `
    ${GovBB.backLink()}
    <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Check your answers</h1>
    <div class="space-y-8">
      <h2 class="font-bold text-[1.5rem]">Your details</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('First name', GovBB.D['first-name'], 'claimant-details')}
        ${GovBB.summaryRow('Middle name(s)', GovBB.D['middle-name'] || 'Not provided', 'claimant-details')}
        ${GovBB.summaryRow('Last name', GovBB.D['last-name'], 'claimant-details')}
        ${GovBB.summaryRow('NIS number', GovBB.D['nis-number'], 'claimant-details')}
        ${GovBB.summaryRow('NRN', GovBB.D['nrn'], 'claimant-details')}
        ${GovBB.summaryRow('Address', [GovBB.D['street-address'], GovBB.D['parish'], GovBB.D['postal-code']].filter(Boolean).join(', '), 'claimant-details')}
        ${GovBB.summaryRow('Email', GovBB.D['contact-email'], 'claimant-details')}
        ${GovBB.summaryRow('Telephone', GovBB.D['telephone'], 'claimant-details')}
      </dl>
      <h2 class="font-bold text-[1.5rem]">Benefit details</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Benefit type', GovBB.D['benefit-type'] === 'Other' ? GovBB.D['benefit-type-other'] : GovBB.D['benefit-type'], 'benefit-type')}
        ${GovBB.summaryRow('Alternate payee', GovBB.D['alt-payee'], 'benefit-type')}
      </dl>
      ${hasAltPayee ? `
      <h2 class="font-bold text-[1.5rem]">Alternate payee details</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Name', [GovBB.D['ap-first-name'], GovBB.D['ap-last-name']].filter(Boolean).join(' '), 'alternate-payee')}
        ${GovBB.summaryRow('NIS number', GovBB.D['ap-nis-number'], 'alternate-payee')}
        ${GovBB.summaryRow('Address', [GovBB.D['ap-street-address'], GovBB.D['ap-parish']].filter(Boolean).join(', '), 'alternate-payee')}
        ${GovBB.summaryRow('Legally empowered', GovBB.D['ap-empowered'], 'alternate-payee')}
      </dl>` : ''}
      <h2 class="font-bold text-[1.5rem]">Bank account details</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Account holder name', GovBB.D['account-holder-name'], 'financial-institution')}
        ${GovBB.summaryRow('Financial institution', GovBB.D['financial-institution'] === 'Other' ? GovBB.D['institution-other'] : GovBB.D['financial-institution'], 'financial-institution')}
        ${GovBB.summaryRow('Account number', GovBB.D['account-number'], 'financial-institution')}
        ${GovBB.summaryRow('Branch name', GovBB.D['branch-name'], 'financial-institution')}
      </dl>
      ${GovBB.continueBtn('Submit Authorisation')}
    </div>`;
  },

  'confirmation': () => `
    <div class="space-y-8">
      <div class="bg-bb-teal-00 text-bb-white-00 p-8 rounded-sm space-y-4">
        <h1 class="font-bold text-[3.5rem] leading-[1.15]">Direct deposit set up</h1>
        <p class="text-[1.5rem]">Your reference number</p>
        <p class="text-[2rem] font-bold">${window.__refNumber || 'DD-' + Math.random().toString(36).substring(2,8).toUpperCase()}</p>
      </div>
      <h2 class="font-bold text-[1.5rem]">What happens next</h2>
      <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
        <li>We will process your direct deposit request within 10 working days.</li>
        <li>Your next benefit payment will be paid into your bank account.</li>
        <li>If you change your bank account, contact NIS straight away.</li>
        <li>Keep your reference number safe in case you need to contact us.</li>
      </ul>
      <p class="text-[1.25rem]"><a href="#" onclick="GovBB.nav('start')" class="${GovBB.LINK_CLS}">Return to start</a></p>
    </div>`
};

function validate(pageId) {
  const D = GovBB.D;
  const errors = [];
  if (pageId === 'claimant-details') {
    if (!D['first-name']) errors.push({ id: 'first-name', msg: 'First name – Enter your first name' });
    if (!D['last-name']) errors.push({ id: 'last-name', msg: 'Last name – Enter your last name' });
    if (!D['nis-number']) errors.push({ id: 'nis-number', msg: 'NIS number – Enter your NIS number' });
    if (!D['nrn']) errors.push({ id: 'nrn', msg: 'National Registration Number – Enter your NRN' });
    if (!D['street-address']) errors.push({ id: 'street-address', msg: 'Street address – Enter your street address' });
    if (!D['parish']) errors.push({ id: 'parish', msg: 'Parish – Select your parish' });
    if (D['postal-code'] && D['postal-code'].trim() && !/^BB\d{5}$/i.test(D['postal-code'].trim())) errors.push({ id: 'postal-code', msg: 'Postal code – Enter a valid postal code, for example BB11000' });
    if (!D['contact-email']) errors.push({ id: 'contact-email', msg: 'Email address – Enter your email address' });
    if (!D['telephone'] && !D['cellular']) errors.push({ id: 'telephone', msg: 'Telephone – Enter at least one phone number' });
  }
  if (pageId === 'benefit-type') {
    if (!D['benefit-type']) errors.push({ id: 'benefit-type', msg: 'Benefit type – Select your benefit type' });
    if (!D['alt-payee']) errors.push({ id: 'alt-payee', msg: 'Alternate payee – Select Yes or No' });
  }
  if (pageId === 'alternate-payee') {
    if (!D['ap-first-name']) errors.push({ id: 'ap-first-name', msg: 'First name – Enter the alternate payee\'s first name' });
    if (!D['ap-last-name']) errors.push({ id: 'ap-last-name', msg: 'Last name – Enter the alternate payee\'s last name' });
    if (!D['ap-nis-number']) errors.push({ id: 'ap-nis-number', msg: 'NIS number – Enter the alternate payee\'s NIS number' });
    if (!D['ap-nrn']) errors.push({ id: 'ap-nrn', msg: 'NRN – Enter the alternate payee\'s NRN' });
    if (!D['ap-street-address']) errors.push({ id: 'ap-street-address', msg: 'Street address – Enter the alternate payee\'s address' });
    if (!D['ap-parish']) errors.push({ id: 'ap-parish', msg: 'Parish – Select the alternate payee\'s parish' });
    if (!D['ap-empowered']) errors.push({ id: 'ap-empowered', msg: 'Legally empowered – Select Yes or No' });
  }
  if (pageId === 'financial-institution') {
    if (!D['account-holder-name']) errors.push({ id: 'account-holder-name', msg: 'Account holder name – Enter the name on the account' });
    if (!D['financial-institution']) errors.push({ id: 'financial-institution', msg: 'Financial institution – Select your bank' });
    if (!D['account-number']) errors.push({ id: 'account-number', msg: 'Account number – Enter your account number' });
    if (!D['branch-name']) errors.push({ id: 'branch-name', msg: 'Branch name – Enter your branch name' });
  }
  if (pageId === 'declaration') {
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: ['start','claimant-details','benefit-type','financial-institution','declaration','check','confirmation'],
  pages: PAGES,
  validate: validate,
  getFlow: getFlow,
  onRadioChange: function(name, value) {
    if (name === 'alt-payee' || name === 'ap-empowered') GovBB.render();
    if (name === 'benefit-type') GovBB.render();
  }
});
</script>
</body>
</html>
