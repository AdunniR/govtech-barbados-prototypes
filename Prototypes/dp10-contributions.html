<script src="/assets/govbb-framework.js"></script>
<script>
const FORM_NAME = 'National Insurance Contributions Certificate (D.P. 10)';

const EARNINGS_TYPES = ['Regular', 'Overtime', 'Commission', 'Bonus', 'Holiday Pay', 'Sick Pay', 'Other'];
const ROLE_OPTIONS = ['Owner', 'Director', 'Payroll Manager', 'Accountant', 'Authorised Agent', 'Other'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function getEarningsRows() {
  return GovBB.D['earnings-rows'] || [{ type: '', employees: '', earnings: '', rate: '11.1', contributions: '0.00' }];
}
function saveEarningsRows(rows) { GovBB.D['earnings-rows'] = rows; }

function calcContributions(earnings, rate) {
  var e = parseFloat(earnings) || 0;
  var r = parseFloat(rate) || 0;
  return (e * r / 100).toFixed(2);
}

function getTotalContributions() {
  return getEarningsRows().reduce(function(sum, row) {
    return sum + (parseFloat(row.contributions) || 0);
  }, 0);
}

function isLate() {
  var year = parseInt(GovBB.D['contrib-year']);
  var month = parseInt(GovBB.D['contrib-month']);
  if (!year || !month) return false;
  var now = new Date();
  var dueDate = new Date(year, month, 15); // 15th of following month
  return now > dueDate;
}

function getDueDate() {
  var year = parseInt(GovBB.D['contrib-year']);
  var month = parseInt(GovBB.D['contrib-month']);
  if (!year || !month) return '';
  var due = new Date(year, month, 15);
  return due.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
}

function renderEarningsGrid() {
  var rows = getEarningsRows();
  var rowsHtml = rows.map(function(row, i) {
    var typeOpts = EARNINGS_TYPES.map(function(t) {
      return '<option value="' + t + '"' + (row.type === t ? ' selected' : '') + '>' + t + '</option>';
    }).join('');
    return `<tr>
      <td class="p-2">
        <select onchange="updateERow(${i},'type',this.value)" class="w-full border-2 border-bb-black-00 rounded-sm p-2 text-[1rem] outline-none focus:ring-4 focus:ring-bb-teal-100">
          <option value="">Select</option>${typeOpts}
        </select>
        ${row.type === 'Other' ? `<input type="text" placeholder="Describe..." class="mt-1 w-full border border-bb-grey-00 rounded-sm p-1 text-[0.875rem]" value="${row.typeOther||''}" oninput="updateERow(${i},'typeOther',this.value)">` : ''}
      </td>
      <td class="p-2"><input type="number" min="0" value="${row.employees||''}" oninput="updateERow(${i},'employees',this.value)" class="w-full border-2 border-bb-black-00 rounded-sm p-2 text-[1rem] outline-none focus:ring-4 focus:ring-bb-teal-100"></td>
      <td class="p-2">
        <div class="flex items-center border-2 border-bb-black-00 rounded-sm">
          <span class="pl-2 text-bb-mid-grey-00">$</span>
          <input type="number" min="0" step="0.01" value="${row.earnings||''}" oninput="updateERow(${i},'earnings',this.value)" class="w-full p-2 text-[1rem] outline-none bg-transparent">
        </div>
      </td>
      <td class="p-2"><input type="number" min="0" step="0.1" value="${row.rate||'11.1'}" oninput="updateERow(${i},'rate',this.value)" class="w-full border-2 border-bb-black-00 rounded-sm p-2 text-[1rem] outline-none focus:ring-4 focus:ring-bb-teal-100" style="width:5rem"></td>
      <td class="p-2 font-bold text-bb-teal-00">$${row.contributions||'0.00'}</td>
      <td class="p-2">${rows.length > 1 ? `<button type="button" onclick="removeERow(${i})" class="text-bb-red-00 underline text-[1rem] hover:text-bb-black-00">Remove</button>` : ''}</td>
    </tr>`;
  }).join('');
  var total = getTotalContributions();
  return `<div>
    <table class="earnings-table mb-4">
      <thead>
        <tr>
          <th>Earnings Type</th><th>No. of Employees</th><th>Insurable Earnings (BDS$)</th><th>Rate %</th><th>Contributions Payable</th><th></th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
      <tfoot>
        <tr class="total-row">
          <td class="p-2 font-bold" colspan="4">Total Contributions Payable</td>
          <td class="p-2 font-bold text-bb-teal-00">$${total.toFixed(2)}</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
    <button type="button" onclick="addERow()" class="inline-flex items-center gap-2 text-[1.25rem] text-bb-teal-00 underline hover:text-bb-black-00 hover:no-underline">+ Add row</button>
  </div>`;
}

function addERow() {
  var rows = getEarningsRows();
  rows.push({ type: '', employees: '', earnings: '', rate: '11.1', contributions: '0.00' });
  saveEarningsRows(rows);
  GovBB.render();
}
function removeERow(i) {
  var rows = getEarningsRows();
  rows.splice(i, 1);
  saveEarningsRows(rows);
  GovBB.render();
}
function updateERow(i, field, value) {
  var rows = getEarningsRows();
  rows[i][field] = value;
  if (field === 'earnings' || field === 'rate') {
    rows[i].contributions = calcContributions(rows[i].earnings, rows[i].rate);
  }
  saveEarningsRows(rows);
  GovBB.render();
}

const PAGES = {
  'start': () => `
    <div class="space-y-8">
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Submit your monthly NIS contributions certificate (D.P. 10)</h1>
      <p class="text-[1.25rem]">Every employer must submit a D.P. 10 certificate each month showing NIS contributions for all employees.</p>
      <div class="bg-bb-red-10 border-l-4 border-bb-red-00 p-4">
        <p class="font-bold">Payment deadline: 15th of the following month</p>
        <p>If you pay late, interest of 1% per month will be added to the amount you owe.</p>
      </div>
      <div>
        <h2 class="font-bold text-[1.5rem] mb-4">What you will need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
          <li>Your employer registration number</li>
          <li>The contribution month and year</li>
          <li>Insurable earnings for each earnings type</li>
          <li>Number of employees for each earnings type</li>
        </ul>
      </div>
      ${GovBB.startBtn()}
    </div>`,

  'employer-details': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your business details</h1>
      <div class="space-y-8">
        ${GovBB.textField('employer-reg', 'Employer registration number', { hint: 'Your NIS employer registration number' })}
        ${GovBB.textField('business-name', 'Business name')}
        ${GovBB.textField('employer-street', 'Street address')}
        ${GovBB.textField('employer-district', 'District', { hint: 'Optional' })}
        ${GovBB.selectField('employer-parish', 'Parish', GovBB.PARISHES)}
        ${GovBB.textField('employer-postal', 'Postal code', { hint: 'For example, BB11000' })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'contributions-period': () => {
    var dueDate = getDueDate();
    var late = isLate();
    var monthOpts = MONTHS.map(function(m, i) {
      return { value: String(i + 1), label: m };
    });
    return `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Which month are you submitting for?</h1>
      <div class="space-y-8">
        ${GovBB.textField('contrib-year', 'Contribution year', { hint: 'For example, 2025', inputmode: 'numeric', maxlength: '4', width: '10rem' })}
        ${GovBB.selectField('contrib-month', 'Contribution month', monthOpts)}
        ${dueDate ? `<div class="bg-bb-blue-10 border-l-4 border-bb-blue-40 p-4">
          <p class="font-bold">Payment due date</p>
          <p>${dueDate}</p>
        </div>` : ''}
        ${late ? `<div class="warning-banner"><p class="font-bold">This submission is late</p><p>Interest of 1% per month will be added to the total amount payable.</p></div>` : ''}
        ${GovBB.continueBtn()}
      </div>
    </form>`;
  },

  'earnings-grid': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Enter insurable earnings</h1>
      <p class="text-[1.25rem] text-bb-mid-grey-00 mb-8">Enter earnings for each type. Contributions are calculated automatically at the rate you enter (default 11.1%).</p>
      <div class="space-y-8">
        ${renderEarningsGrid()}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'discrepancies': () => {
    var total = getTotalContributions();
    var overpay = parseFloat(GovBB.D['prev-overpayment']) || 0;
    var shortpay = parseFloat(GovBB.D['prev-shortpayment']) || 0;
    var finalTotal = Math.max(0, total - overpay + shortpay).toFixed(2);
    GovBB.D['final-total'] = finalTotal;
    return `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Adjust for previous payments</h1>
      <div class="space-y-8">
        <div class="bg-bb-blue-10 p-4 rounded-md">
          <p class="font-bold">Total contributions from earnings: <span class="text-bb-teal-00">BDS$ ${total.toFixed(2)}</span></p>
        </div>
        ${GovBB.textField('prev-overpayment', 'Less: previous overpayment (BDS$)', { hint: 'Enter 0 if there is none', inputmode: 'decimal' })}
        ${GovBB.textField('prev-shortpayment', 'Add: previous shortpayment (BDS$)', { hint: 'Enter 0 if there is none', inputmode: 'decimal' })}
        <div class="bg-bb-teal-10 border-2 border-bb-teal-00 rounded-md p-6">
          <p class="font-bold text-[1.25rem]">Total amount payable: <span class="text-bb-teal-00">BDS$ ${finalTotal}</span></p>
        </div>
        ${GovBB.continueBtn()}
      </div>
    </form>`;
  },

  'declaration': () => {
    var late = isLate();
    return `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Declaration</h1>
      <div class="space-y-8">
        <div class="space-y-2 mb-6">
          <p class="text-[1.25rem]"><span class="font-bold">Authorised signatory:</span> ${GovBB.D['signatory-name'] || GovBB.D['business-name'] || '—'}</p>
          <p class="text-[1.25rem]"><span class="font-bold">Date:</span> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
        </div>
        ${late ? `<div class="warning-banner"><p class="font-bold">Late submission warning</p><p>This certificate is being submitted after the payment deadline. Interest of 1% per month applies to the outstanding amount.</p></div>` : ''}
        <div class="bg-bb-blue-10 border-l-4 border-bb-blue-40 p-6">
          <p class="text-[1.25rem]">I declare that the information in this certificate is true and correct. I understand that providing false information may result in prosecution.</p>
        </div>
        ${GovBB.textField('signatory-name', 'Authorised signatory name')}
        ${GovBB.selectField('signatory-role', 'Role or title', ROLE_OPTIONS)}
        ${GovBB.D['signatory-role'] === 'Other' ? GovBB.textField('signatory-role-other', 'Please describe your role') : ''}
        ${GovBB.checkboxItem('declaration-agree', 'I confirm that the information I have given is true and complete to the best of my knowledge.')}
        <div class="mt-8 flex gap-4">
          <button type="button" onclick="back()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-colors duration-200 outline-none bg-bb-grey-00 text-bb-black-00 hover:bg-[#c5ccd4] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Back</button>
          <button type="button" onclick="next()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] hover:shadow-[inset_0_0_0_4px_rgba(222,245,246,0.10)] active:bg-[#0a4549] active:shadow-[inset_0_0_0_3px_rgba(0,0,0,0.20)] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Submit certificate</button>
        </div>
      </div>
    </form>`;
  },

  'check': () => {
    var rows = getEarningsRows();
    var earningsHtml = rows.map(function(row) {
      return GovBB.summaryRow(
        row.type || 'Unnamed type',
        (row.employees || 0) + ' employees — $' + (row.earnings || '0') + ' @ ' + (row.rate || '11.1') + '% = $' + (row.contributions || '0.00'),
        'earnings-grid'
      );
    }).join('');
    return `
    ${GovBB.backLink()}
    <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Check your answers</h1>
    <div class="space-y-8">
      <h2 class="font-bold text-[1.5rem]">Employer details</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Registration number', GovBB.D['employer-reg'], 'employer-details')}
        ${GovBB.summaryRow('Business name', GovBB.D['business-name'], 'employer-details')}
        ${GovBB.summaryRow('Address', [GovBB.D['employer-street'], GovBB.D['employer-parish'], GovBB.D['employer-postal']].filter(Boolean).join(', '), 'employer-details')}
      </dl>
      <h2 class="font-bold text-[1.5rem]">Contribution period</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Year', GovBB.D['contrib-year'], 'contributions-period')}
        ${GovBB.summaryRow('Month', MONTHS[(parseInt(GovBB.D['contrib-month']) || 1) - 1], 'contributions-period')}
        ${GovBB.summaryRow('Payment due', getDueDate(), 'contributions-period')}
      </dl>
      <h2 class="font-bold text-[1.5rem]">Earnings</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">${earningsHtml}</dl>
      <h2 class="font-bold text-[1.5rem]">Adjustments</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Previous overpayment', 'BDS$ ' + (GovBB.D['prev-overpayment'] || '0'), 'discrepancies')}
        ${GovBB.summaryRow('Previous shortpayment', 'BDS$ ' + (GovBB.D['prev-shortpayment'] || '0'), 'discrepancies')}
        ${GovBB.summaryRow('Total amount payable', 'BDS$ ' + (GovBB.D['final-total'] || '0.00'), 'discrepancies')}
      </dl>
      ${GovBB.continueBtn('Submit Certificate')}
    </div>`;
  },

  'confirmation': () => `
    <div class="space-y-8">
      <div class="bg-bb-teal-00 text-bb-white-00 p-8 rounded-sm space-y-4">
        <h1 class="font-bold text-[3.5rem] leading-[1.15]">Certificate submitted</h1>
        <p class="text-[1.5rem]">Your reference number</p>
        <p class="text-[2rem] font-bold">${window.__refNumber || 'DP10-' + Math.random().toString(36).substring(2, 8).toUpperCase()}</p>
      </div>
      <div class="bg-bb-blue-10 p-6 rounded-md">
        <p class="font-bold text-[1.25rem]">Total amount due: BDS$ ${GovBB.D['final-total'] || '0.00'}</p>
        <p class="text-[1.25rem]">Payment deadline: ${getDueDate()}</p>
      </div>
      <h2 class="font-bold text-[1.5rem]">What happens next</h2>
      <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
        <li>Pay the total amount shown above by the deadline to avoid interest charges.</li>
        <li>Payment can be made at any NIS office or via bank transfer.</li>
        <li>Keep this reference number for your records.</li>
      </ul>
      <p class="text-[1.25rem]"><a href="#" onclick="GovBB.nav('start')" class="${GovBB.LINK_CLS}">Return to start</a></p>
    </div>`
};

function validate(pageId) {
  var D = GovBB.D;
  var errors = [];
  if (pageId === 'employer-details') {
    if (!D['employer-reg']) errors.push({ id: 'employer-reg', msg: 'Employer registration number – Enter your registration number' });
    if (!D['business-name']) errors.push({ id: 'business-name', msg: 'Business name – Enter your business name' });
    if (!D['employer-street']) errors.push({ id: 'employer-street', msg: 'Street address – Enter your street address' });
    if (!D['employer-parish']) errors.push({ id: 'employer-parish', msg: 'Parish – Select your parish' });
    if (!D['employer-postal']) errors.push({ id: 'employer-postal', msg: 'Postal code – Enter your postal code' });
  }
  if (pageId === 'contributions-period') {
    if (!D['contrib-year'] || D['contrib-year'].length !== 4) errors.push({ id: 'contrib-year', msg: 'Contribution year – Enter a 4-digit year' });
    if (!D['contrib-month']) errors.push({ id: 'contrib-month', msg: 'Contribution month – Select the contribution month' });
  }
  if (pageId === 'earnings-grid') {
    var rows = getEarningsRows();
    if (!rows.length || !rows[0].type) errors.push({ id: 'earnings-grid', msg: 'Earnings – Add at least one earnings row' });
  }
  if (pageId === 'discrepancies') {
    var overpay = parseFloat(D['prev-overpayment']) || 0;
    var total = getTotalContributions();
    if (overpay > total) errors.push({ id: 'prev-overpayment', msg: 'Previous overpayment – Cannot be more than total contributions' });
  }
  if (pageId === 'declaration') {
    if (!D['signatory-name']) errors.push({ id: 'signatory-name', msg: 'Signatory name – Enter the authorised signatory\'s name' });
    if (!D['signatory-role']) errors.push({ id: 'signatory-role', msg: 'Role – Select the signatory\'s role' });
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: ['start', 'employer-details', 'contributions-period', 'earnings-grid', 'discrepancies', 'declaration', 'check', 'confirmation'],
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name) {
    if (name === 'signatory-role') GovBB.render();
  }
});
</script>
</body>
</html>
