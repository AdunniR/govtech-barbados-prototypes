<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claim for travel during examinations – Ministry of Education, Technological and Vocational Training</title>
  <link rel="stylesheet" href="../dist/styles.css">
</head>
<body class="govbb-page">
<div class="govbb-official-banner">
  <div class="govbb-container govbb-official-banner__inner">
    <div class="govbb-official-banner__crest"><img class="govbb-official-banner__icon" src="../dist/assets/images/govbb-creast.svg" alt="" /></div>
    <div class="govbb-official-banner__text"><span>Official government website</span></div>
  </div>
</div>
<header class="govbb-header">
  <div class="govbb-container govbb-header__inner">
    <a href="/" aria-label="Go to the alpha.gov.bb homepage">
      <img class="govbb-header__logo" src="../dist/assets/images/govbb-logo.svg" alt="GovBB" />
    </a>
  </div>
</header>
<main class="govbb-page__main">
  <div class="govbb-status-banner govbb-status-banner--alpha" role="status" aria-label="alpha status banner" aria-live="polite">
    <div class="govbb-container"><p>This page is in <a class="govbb-link govbb-link--secondary" href="#">Alpha</a>. Your feedback helps us improve.</p></div>
  </div>
  <div class="govbb-container" id="app" style="padding-block: var(--spacing-l); max-width: 48rem;"></div>
</main>
<footer class="govbb-footer">
  <div class="govbb-container govbb-footer__inner">
    <nav class="govbb-footer__nav" aria-label="Footer">
      <a class="govbb-footer__link" href="#">Home</a>
      <a class="govbb-footer__link" href="#">Privacy</a>
      <a class="govbb-footer__link" href="#">Terms &amp; Conditions</a>
      <a class="govbb-footer__link" href="#">Accessibility</a>
    </nav>
    <hr class="govbb-footer__divider" aria-hidden="true" />
    <div class="govbb-footer__end">
      <img class="govbb-footer__coat" src="../dist/assets/images/govbb-creast.svg" alt="Government of Barbados Coat of Arms" />
      <p class="govbb-footer__copy">&copy; 2026 Government of Barbados</p>
    </div>
  </div>
</footer>
<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors=function(){var s=document.getElementById('error-summary');if(s)s.remove();document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});};
GovBB.showErrors=function(errors){GovBB.clearErrors();if(!errors||!errors.length)return;var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>';});html+='</ul></div>';document.getElementById('app').insertAdjacentHTML('afterbegin',html);document.getElementById('error-summary').focus();errors.forEach(function(e){var el=document.getElementById(e.id);if(!el)return;var errId='err-'+e.id;el.setAttribute('aria-invalid','true');el.setAttribute('aria-describedby',errId);var msg=document.createElement('p');msg.className='govbb-error-message';msg.id=errId;msg.textContent=e.msg;var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;if(group)group.appendChild(msg);});if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;};
GovBB.summaryRow=function(label,value,changeTo){var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';};
</script>
<script>
const DEPT='Ministry of Education, Technological and Vocational Training';
function cap(){return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">'+DEPT+'</p>';}
function sel(id,field,opts,ph){ph=ph||'Select one';return '<div class="govbb-select-wrapper"><select class="govbb-select" id="'+id+'" name="'+id+'" data-field="'+field+'"><option value="">'+ph+'</option>'+opts.map(function(o){return '<option value="'+o+'"'+(GovBB.D[field]===o?' selected':'')+'>'+o+'</option>';}).join('')+'</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div>';}
function chk(id,field,label){return '<div class="govbb-checkbox-item"><input class="govbb-checkbox" type="checkbox" id="'+id+'" name="'+id+'" data-field="'+field+'"'+(GovBB.D[field]?' checked':'')+'/><label class="govbb-checkbox-item__label" for="'+id+'">'+label+'</label></div>';}
function inp(id,field,val,type){type=type||'text';return '<div class="govbb-input-wrapper"><input class="govbb-input" type="'+type+'" id="'+id+'" name="'+id+'" data-field="'+field+'" value="'+(val||'')+'"'+(type==='email'?' autocomplete="email"':'')+'/></div>';}
function btns(){return '<div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Continue</button><button type="button" class="govbb-btn--link" onclick="back()">Back</button></div>';}

const BANKS=['Bank of Nova Scotia','Royal Bank of Canada (RBC)','Republic Bank','First Citizens Bank','CIBC Caribbean','Sagicor Bank','Barbados Public Workers Co-operative Credit Union','City of Bridgetown Co-operative Credit Union','Barbados Teachers Co-operative Credit Union','The Postal Co-operative Credit Union','Other'];

function journeyRow(n){
  return `<div style="border:1px solid var(--color-grey-00);border-radius:4px;padding:var(--spacing-m);margin-bottom:var(--spacing-m);">
  <p style="font-weight:var(--font-weight-bold);font-size:var(--font-size-body);margin-bottom:var(--spacing-s);">Journey ${n}</p>
  <div class="govbb-form-group" style="margin-bottom:var(--spacing-s);"><label class="govbb-label" for="j${n}-date">Date</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="j${n}-date" data-field="j${n}-date" value="${GovBB.D['j'+n+'-date']||''}" placeholder="DD MM YYYY" /></div></div>
  <div class="govbb-form-group" style="margin-bottom:var(--spacing-s);"><label class="govbb-label" for="j${n}-from">From</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="j${n}-from" data-field="j${n}-from" value="${GovBB.D['j'+n+'-from']||''}" /></div></div>
  <div class="govbb-form-group" style="margin-bottom:var(--spacing-s);"><label class="govbb-label" for="j${n}-to">To</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="j${n}-to" data-field="j${n}-to" value="${GovBB.D['j'+n+'-to']||''}" /></div></div>
  <div class="govbb-form-group" style="margin-bottom:0;"><label class="govbb-label" for="j${n}-amount">Amount claimed (BDS$)</label><div class="govbb-input-wrapper" style="max-width:10rem;"><input class="govbb-input" type="text" id="j${n}-amount" data-field="j${n}-amount" inputmode="decimal" value="${GovBB.D['j'+n+'-amount']||''}" /></div></div>
  </div>`;
}

const FLOW=['start','claimant-details','exam-details','travel-entries','banking','declaration','check','confirmation'];
const PAGES={
'start':()=>`<div>${cap()}<h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Claim for travel during examination periods</h1><hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">
<p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Use this form to claim travel expenses you incurred while carrying out examination duties.</p>
<p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Most people finish this form in about <strong>8 minutes</strong>.</p>
<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
<ul class="govbb-text-body" style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);list-style:disc;">
<li style="margin-bottom:var(--spacing-xs);">National Registration Number (NRN)</li>
<li style="margin-bottom:var(--spacing-xs);">Details of each journey (date, from, to, amount)</li>
<li style="margin-bottom:var(--spacing-xs);">Your bank account details</li>
</ul>
<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Need help?</h2>
<p class="govbb-text-body" style="margin-bottom:var(--spacing-l);">Email <strong>mist.forms@barbados.gov.bb</strong> or call <strong>+1 (246) 535-1284</strong>.</p>
<div style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start claim</button></div></div>`,

'claimant-details':()=>`<form novalidate>${cap()}<h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you</h1>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="c-firstname">First name</label>${inp('c-firstname','c-firstname',GovBB.D['c-firstname'])}</div>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="c-lastname">Last name</label>${inp('c-lastname','c-lastname',GovBB.D['c-lastname'])}</div>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="c-nrn">National Registration Number (NRN)</label><p class="govbb-hint">Your 11-character NRN, for example 110915-0048.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="c-nrn" data-field="c-nrn" value="${GovBB.D['c-nrn']||''}" placeholder="110915-0048" style="max-width:14rem;" /></div></div>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="c-school">School or institution</label>${inp('c-school','c-school',GovBB.D['c-school'])}</div>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="c-phone">Phone number</label>${inp('c-phone','c-phone',GovBB.D['c-phone'],'tel')}</div>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="c-email">Email address</label>${inp('c-email','c-email',GovBB.D['c-email'],'email')}</div>
${btns()}</form>`,

'exam-details':()=>`<form novalidate>${cap()}<h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Examination details</h1>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="e-exam">Examination period</label>${sel('e-exam','e-exam',['2026 CXC – January','2026 CXC – May/June','2026 CAPE – June','2026 CPEA','Other'])}</div>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="e-month">Month of claim</label>${sel('e-month','e-month',['January','February','March','April','May','June','July','August','September','October','November','December'])}</div>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="e-year">Year</label>${sel('e-year','e-year',['2026','2027'])}</div>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="e-role">Your role during examinations</label>${sel('e-role','e-role',['Supervisor','Assistant Supervisor','Chief Invigilator','Invigilator','External Examiner','Oral Examiner','Other'])}</div>
${btns()}</form>`,

'travel-entries':()=>`<form novalidate>${cap()}<h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your journeys</h1>
<p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">List up to 5 journeys. Add one row per day travelled.</p>
${journeyRow(1)}${journeyRow(2)}${journeyRow(3)}${journeyRow(4)}${journeyRow(5)}
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="t-total">Total amount claimed (BDS$)</label><p class="govbb-hint">Add up all your journey amounts.</p><div class="govbb-input-wrapper" style="max-width:10rem;"><input class="govbb-input" type="text" id="t-total" data-field="t-total" inputmode="decimal" value="${GovBB.D['t-total']||''}" /></div></div>
${btns()}</form>`,

'banking':()=>`<form novalidate>${cap()}<h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your bank account</h1>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="bk-bank">Bank or financial institution</label>${sel('bk-bank','bk-bank',BANKS)}</div>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="bk-type">Account type</label>${sel('bk-type','bk-type',['Savings','Chequing','Deposit'])}</div>
<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="bk-number">Account number</label>${inp('bk-number','bk-number',GovBB.D['bk-number'])}</div>
${btns()}</form>`,

'declaration':()=>`<form novalidate>${cap()}<h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>
<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend govbb-visually-hidden">Declaration statements</legend><div style="display:flex;flex-direction:column;gap:var(--spacing-s);">
${chk('d-accurate','d-accurate','The information I have given is true and accurate.')}
${chk('d-travel','d-travel','I made all journeys listed in connection with my examination duties.')}
${chk('d-bank','d-bank','The bank account details I have given are correct and belong to me.')}
</div></fieldset>
${btns()}</form>`,

'check':()=>`<div>${cap()}<h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers</h1>
<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">About you</h2><dl style="margin-bottom:var(--spacing-m);">
${GovBB.summaryRow('Name',GovBB.D['c-firstname']+' '+GovBB.D['c-lastname'],'claimant-details')}
${GovBB.summaryRow('NRN',GovBB.D['c-nrn'],'claimant-details')}
${GovBB.summaryRow('School',GovBB.D['c-school'],'claimant-details')}</dl>
<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Examination</h2><dl style="margin-bottom:var(--spacing-m);">
${GovBB.summaryRow('Examination period',GovBB.D['e-exam'],'exam-details')}
${GovBB.summaryRow('Month',GovBB.D['e-month']+' '+GovBB.D['e-year'],'exam-details')}
${GovBB.summaryRow('Role',GovBB.D['e-role'],'exam-details')}</dl>
<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Claim total</h2><dl style="margin-bottom:var(--spacing-m);">
${GovBB.summaryRow('Total amount (BDS$)',GovBB.D['t-total'],'travel-entries')}</dl>
<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Bank account</h2><dl style="margin-bottom:var(--spacing-m);">
${GovBB.summaryRow('Bank',GovBB.D['bk-bank'],'banking')}
${GovBB.summaryRow('Account type',GovBB.D['bk-type'],'banking')}</dl>
<div style="background:var(--color-yellow-20);border-left:4px solid var(--color-yellow-40);padding:var(--spacing-s) var(--spacing-m);margin-bottom:var(--spacing-m);"><p class="govbb-text-body">By sending this claim you confirm all information is true and accurate.</p></div>
<div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Send claim</button><button type="button" class="govbb-btn--link" onclick="back()">Back</button></div></div>`,

'confirmation':()=>{GovBB.D['ref-et']=GovBB.D['ref-et']||('MoE-ET-'+Math.floor(10000+Math.random()*90000));return `<div>
<div style="background:var(--color-teal-20);border-left:6px solid var(--color-teal-40);padding:var(--spacing-m) var(--spacing-l);margin-bottom:var(--spacing-l);">
<h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Claim sent</h1>
<p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your reference number is</p>
<p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);letter-spacing:0.05em;">${GovBB.D['ref-et']}</p></div>
<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
<ol class="govbb-text-body" style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);">
<li style="margin-bottom:var(--spacing-s);">Your claim will be reviewed by the Examinations team and the Accounts Officer.</li>
<li style="margin-bottom:var(--spacing-s);">Payment will be made to your bank account within <strong>15 working days</strong> of approval.</li></ol>
<p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Questions? Email <strong>mist.forms@barbados.gov.bb</strong> with your reference number.</p>
<a href="/" class="govbb-link">Back to home</a></div>`;}
};

const REQUIRED={
'claimant-details':[{id:'c-firstname',msg:'Enter your first name'},{id:'c-lastname',msg:'Enter your last name'},{id:'c-nrn',msg:'Enter your NRN'},{id:'c-school',msg:'Enter your school or institution'},{id:'c-phone',msg:'Enter your phone number'},{id:'c-email',msg:'Enter your email address'}],
'exam-details':[{id:'e-exam',msg:'Choose the examination period'},{id:'e-month',msg:'Choose the month'},{id:'e-year',msg:'Choose the year'},{id:'e-role',msg:'Choose your role'}],
'travel-entries':[{id:'j1-date',msg:'Enter the date of your first journey'},{id:'j1-from',msg:'Enter where your first journey started'},{id:'j1-to',msg:'Enter where your first journey ended'},{id:'t-total',msg:'Enter the total amount claimed'}],
'banking':[{id:'bk-bank',msg:'Choose your bank or financial institution'},{id:'bk-type',msg:'Choose your account type'},{id:'bk-number',msg:'Enter your account number'}],
'declaration':[{id:'d-accurate',msg:'You must confirm the information is accurate'},{id:'d-travel',msg:'You must confirm all journeys were for examination duties'},{id:'d-bank',msg:'You must confirm your bank details are correct'}],
};
GovBB.init({appElementId:'app',flow:FLOW,pages:PAGES,validate:function(page){var rules=REQUIRED[page];if(!rules)return[];return rules.filter(function(r){var el=document.getElementById(r.id);if(!el)return false;if(el.type==='checkbox')return !el.checked;return !el.value.trim();});}});
</script>
</body>
</html>
