<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply to teach temporarily – Ministry of Education, Technological and Vocational Training</title>
  <link rel="stylesheet" href="../dist/styles.css">
  <style>
    /* Fix chevron: remove CSS rotation, enlarge */
    .govbb-select__chevron > svg {
      width: 1.25rem !important;
      height: 1rem !important;
      transform: none !important;
    }
    .rep-card {
      border: 1px solid var(--color-grey-00);
      border-radius: 4px;
      padding: var(--spacing-m);
      margin-bottom: var(--spacing-m);
    }
    .rep-card__hd {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: var(--spacing-s);
      padding-bottom: var(--spacing-xs);
      border-bottom: 1px solid var(--color-grey-00);
    }
    .rep-card__title { font-weight: var(--font-weight-bold); font-size: var(--font-size-body); }
    .btn-remove {
      background: none; border: none; color: var(--color-red-00);
      cursor: pointer; font-size: var(--font-size-caption);
      font-family: var(--font-family-base); text-decoration: underline; padding: 0;
    }
    .btn-remove:hover { text-decoration: none; }
    .btn-add {
      display: inline-flex; align-items: center; gap: var(--spacing-xs);
      background: none; border: 2px solid var(--color-teal-00); color: var(--color-teal-00);
      border-radius: 4px; cursor: pointer; font-size: var(--font-size-body);
      font-family: var(--font-family-base); font-weight: var(--font-weight-bold);
      padding: var(--spacing-xs) var(--spacing-m); margin-bottom: var(--spacing-m);
    }
    .btn-add:hover { background: var(--color-teal-10); }
    .govbb-file-upload {
      display: block; width: 100%; padding: var(--spacing-s);
      border: 2px solid var(--color-text); border-radius: 4px;
      font-family: var(--font-family-base); font-size: var(--font-size-body);
      cursor: pointer; background: var(--color-background); box-sizing: border-box;
    }
    .govbb-file-upload:focus { outline: 4px solid var(--color-teal-100); outline-offset: 2px; }
    .from-to-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-m); margin-bottom: var(--spacing-m); }
    @media (max-width: 480px) { .from-to-grid { grid-template-columns: 1fr; } }
    /* govbb-input/textarea have no border by default — border lives on govbb-input-wrapper.
       Override here so bare inputs display correctly without the wrapper. */
    .govbb-input, .govbb-textarea {
      border: var(--border-width-form) solid var(--color-text) !important;
      border-radius: var(--radius-sm) !important;
      padding: var(--spacing-s) !important;
      background: var(--color-background) !important;
      width: 100%;
      box-sizing: border-box !important;
    }
    .govbb-input:focus, .govbb-textarea:focus {
      outline: 4px solid var(--color-teal-100) !important;
      outline-offset: 2px !important;
      border-color: var(--color-teal-00) !important;
    }
  </style>
</head>

<div class="govbb-official-banner">

</div>

<header class="govbb-header">

<main class="govbb-page__main">

<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id); if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true'); el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
const DEPT = 'Ministry of Education, Technological and Vocational Training';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const FLOW = [
  'start',
  'personal-details',
  'contact',
  'educational-records',
  'qualifications',
  'work-experience',
  'other-info',
  'references',
  'documents',
  'declaration',
  'check',
  'confirmation'
];

function next() { GovBB.next(); }
function back() { GovBB.back(); }
function nav(p) { GovBB.nav(p); }

function caption(t) {
  return `<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">${t}</p>`;
}

function selectHtml(id, field, options, placeholder) {
  placeholder = placeholder || 'Select one';
  return `<div class="govbb-select-wrapper">
    <select class="govbb-select" id="${id}" name="${id}" data-field="${field}">
      <option value="">${placeholder}</option>
      ${options.map(o => `<option value="${o}"${GovBB.D[field]===o?' selected':''}>${o}</option>`).join('')}
    </select>
    <span class="govbb-select__chevron" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
  </div>`;
}

function radioGroup(name, options) {
  return options.map((o, i) => `
    <div class="govbb-radio-item">
      <input class="govbb-radio" type="radio" id="${name}-${i}" name="${name}" data-field="${name}" value="${o}"${GovBB.D[name]===o?' checked':''}/>
      <label class="govbb-radio-item__label" for="${name}-${i}">${o}</label>
    </div>`).join('');
}

function saveFields() {
  document.querySelectorAll('[data-field]').forEach(function(el) {
    const f = el.getAttribute('data-field');
    if (el.type === 'checkbox') { GovBB.D[f] = el.checked; }
    else { GovBB.D[f] = el.value; }
  });
}

/* ── Educational records helpers ── */
function eduRowHtml(n, total) {
  return `<div class="rep-card">
    ${total > 1 ? `<div class="rep-card__hd"><span class="rep-card__title">Institution ${n}</span><button type="button" class="btn-remove" onclick="removeEdu(${n})">Remove</button></div>` : ''}
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="edu-inst-${n}">Name of institution</label>
      <input class="govbb-input" type="text" id="edu-inst-${n}" name="edu-inst-${n}" data-field="edu-inst-${n}" value="${GovBB.D['edu-inst-'+n]||''}" />
    </div>
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="edu-country-${n}">Country</label>
      <input class="govbb-input" type="text" id="edu-country-${n}" name="edu-country-${n}" data-field="edu-country-${n}" value="${GovBB.D['edu-country-'+n]||''}" />
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-s);">
      <div class="govbb-form-group" style="margin-bottom:0;">
        <label class="govbb-label" for="edu-from-${n}">From (year)</label>
        <input class="govbb-input" type="text" id="edu-from-${n}" name="edu-from-${n}" data-field="edu-from-${n}" value="${GovBB.D['edu-from-'+n]||''}" inputmode="numeric" />
      </div>
      <div class="govbb-form-group" style="margin-bottom:0;">
        <label class="govbb-label" for="edu-to-${n}">To (year)</label>
        <input class="govbb-input" type="text" id="edu-to-${n}" name="edu-to-${n}" data-field="edu-to-${n}" value="${GovBB.D['edu-to-'+n]||''}" inputmode="numeric" />
      </div>
    </div>
  </div>`;
}
function addEdu() { saveFields(); GovBB.D['edu-count'] = (GovBB.D['edu-count']||1)+1; GovBB.nav('educational-records'); }
function removeEdu(n) {
  saveFields();
  const c = GovBB.D['edu-count']||1;
  for (let i=n; i<c; i++) ['edu-inst','edu-country','edu-from','edu-to'].forEach(f=>{ GovBB.D[f+'-'+i]=GovBB.D[f+'-'+(i+1)]||''; });
  ['edu-inst','edu-country','edu-from','edu-to'].forEach(f=>{ delete GovBB.D[f+'-'+c]; });
  GovBB.D['edu-count'] = Math.max(1,c-1); GovBB.nav('educational-records');
}

/* ── Qualifications helpers ── */
function qualRowHtml(n, total) {
  return `<div class="rep-card">
    ${total > 1 ? `<div class="rep-card__hd"><span class="rep-card__title">Qualification ${n}</span><button type="button" class="btn-remove" onclick="removeQual(${n})">Remove</button></div>` : ''}
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="qual-subj-${n}">Subject passed</label>
      <input class="govbb-input" type="text" id="qual-subj-${n}" name="qual-subj-${n}" data-field="qual-subj-${n}" value="${GovBB.D['qual-subj-'+n]||''}" />
    </div>
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="qual-type-${n}">Academic / Technical / Professional</label>
      ${selectHtml('qual-type-'+n,'qual-type-'+n,['Academic','Technical','Professional'],'Select type')}
    </div>
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="qual-body-${n}">Examining body</label>
      <p class="govbb-hint">For example: CXC, GCE, UWI, BCC.</p>
      <input class="govbb-input" type="text" id="qual-body-${n}" name="qual-body-${n}" data-field="qual-body-${n}" value="${GovBB.D['qual-body-'+n]||''}" />
    </div>
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="qual-year-${n}">Date (year)</label>
      <input class="govbb-input" type="text" id="qual-year-${n}" name="qual-year-${n}" data-field="qual-year-${n}" value="${GovBB.D['qual-year-'+n]||''}" inputmode="numeric" style="max-width:7rem;" />
    </div>
    <div class="govbb-form-group" style="margin-bottom:0;">
      <label class="govbb-label" for="qual-grade-${n}">Level / Grade passed</label>
      <p class="govbb-hint">For example: Grade 1, A, Pass, Distinction.</p>
      <input class="govbb-input" type="text" id="qual-grade-${n}" name="qual-grade-${n}" data-field="qual-grade-${n}" value="${GovBB.D['qual-grade-'+n]||''}" style="max-width:12rem;" />
    </div>
  </div>`;
}
function addQual() { saveFields(); GovBB.D['qual-count']=(GovBB.D['qual-count']||1)+1; GovBB.nav('qualifications'); }
function removeQual(n) {
  saveFields();
  const c = GovBB.D['qual-count']||1;
  for (let i=n; i<c; i++) ['qual-subj','qual-type','qual-body','qual-year','qual-grade'].forEach(f=>{ GovBB.D[f+'-'+i]=GovBB.D[f+'-'+(i+1)]||''; });
  ['qual-subj','qual-type','qual-body','qual-year','qual-grade'].forEach(f=>{ delete GovBB.D[f+'-'+c]; });
  GovBB.D['qual-count']=Math.max(1,c-1); GovBB.nav('qualifications');
}

/* ── Work experience helpers ── */
function workRowHtml(n, total) {
  return `<div class="rep-card">
    ${total > 1 ? `<div class="rep-card__hd"><span class="rep-card__title">Employment ${n}</span><button type="button" class="btn-remove" onclick="removeWork(${n})">Remove</button></div>` : ''}
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="work-employer-${n}">Name of employer</label>
      <input class="govbb-input" type="text" id="work-employer-${n}" name="work-employer-${n}" data-field="work-employer-${n}" value="${GovBB.D['work-employer-'+n]||''}" />
    </div>
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="work-position-${n}">Position held</label>
      <input class="govbb-input" type="text" id="work-position-${n}" name="work-position-${n}" data-field="work-position-${n}" value="${GovBB.D['work-position-'+n]||''}" />
    </div>
    <div class="from-to-grid">
      <div>
        <p class="govbb-label" style="margin-bottom:var(--spacing-xs);">From</p>
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-xs);">
          <label class="govbb-label" for="work-from-month-${n}" style="font-weight:normal;font-size:var(--font-size-caption);">Month</label>
          ${selectHtml('work-from-month-'+n,'work-from-month-'+n,MONTHS,'Select')}
        </div>
        <div class="govbb-form-group" style="margin-bottom:0;">
          <label class="govbb-label" for="work-from-year-${n}" style="font-weight:normal;font-size:var(--font-size-caption);">Year</label>
          <input class="govbb-input" type="text" id="work-from-year-${n}" name="work-from-year-${n}" data-field="work-from-year-${n}" value="${GovBB.D['work-from-year-'+n]||''}" inputmode="numeric" placeholder="e.g. 2020" />
        </div>
      </div>
      <div>
        <p class="govbb-label" style="margin-bottom:var(--spacing-xs);">To</p>
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-xs);">
          <label class="govbb-label" for="work-to-month-${n}" style="font-weight:normal;font-size:var(--font-size-caption);">Month</label>
          ${selectHtml('work-to-month-'+n,'work-to-month-'+n,MONTHS,'Select')}
        </div>
        <div class="govbb-form-group" style="margin-bottom:0;">
          <label class="govbb-label" for="work-to-year-${n}" style="font-weight:normal;font-size:var(--font-size-caption);">Year or "Present"</label>
          <input class="govbb-input" type="text" id="work-to-year-${n}" name="work-to-year-${n}" data-field="work-to-year-${n}" value="${GovBB.D['work-to-year-'+n]||''}" placeholder="e.g. 2023 or Present" />
        </div>
      </div>
    </div>
    <div class="govbb-form-group" style="margin-bottom:0;">
      <label class="govbb-label" for="work-duties-${n}">Brief description of duties</label>
      <textarea class="govbb-textarea" id="work-duties-${n}" name="work-duties-${n}" data-field="work-duties-${n}" rows="3" style="width:100%;">${GovBB.D['work-duties-'+n]||''}</textarea>
    </div>
  </div>`;
}
function addWork() { saveFields(); GovBB.D['work-count']=(GovBB.D['work-count']||1)+1; GovBB.nav('work-experience'); }
function removeWork(n) {
  saveFields();
  const c = GovBB.D['work-count']||1;
  for (let i=n; i<c; i++) ['work-employer','work-position','work-from-month','work-from-year','work-to-month','work-to-year','work-duties'].forEach(f=>{ GovBB.D[f+'-'+i]=GovBB.D[f+'-'+(i+1)]||''; });
  ['work-employer','work-position','work-from-month','work-from-year','work-to-month','work-to-year','work-duties'].forEach(f=>{ delete GovBB.D[f+'-'+c]; });
  GovBB.D['work-count']=Math.max(1,c-1); GovBB.nav('work-experience');
}

/* ── Pages ── */
const PAGES = {

  'start': () => `
    <div>
      ${caption(DEPT)}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Apply to teach temporarily</h1>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Use this form to apply for a temporary teaching position at a government school in Barbados.</p>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul class="govbb-text-body" style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);list-style:disc;">
        <li style="margin-bottom:var(--spacing-xs);">National Registration Number (NRN)</li>
        <li style="margin-bottom:var(--spacing-xs);">National Insurance Number (NIN)</li>
        <li style="margin-bottom:var(--spacing-xs);">Details of all educational institutions attended</li>
        <li style="margin-bottom:var(--spacing-xs);">Details of your qualifications</li>
        <li style="margin-bottom:var(--spacing-xs);">Work history (employer names, positions, dates)</li>
        <li style="margin-bottom:var(--spacing-xs);">Details of two referees (name, address, contact)</li>
        <li style="margin-bottom:var(--spacing-xs);">Copies of certificates/transcripts and two testimonials to upload</li>
      </ul>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Need help?</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-l);">Call the Ministry on <strong>+1 (246) 430-2700</strong> or email <strong>education@barbados.gov.bb</strong>.</p>
      <div style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Start application</button>
      </div>
    </div>`,

  'personal-details': () => `
    <form novalidate>
      ${caption(DEPT)}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="firstname">First name</label>
        <input class="govbb-input" type="text" id="firstname" name="firstname" data-field="firstname" autocomplete="given-name" value="${GovBB.D['firstname']||''}" />
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="lastname">Last name</label>
        <input class="govbb-input" type="text" id="lastname" name="lastname" data-field="lastname" autocomplete="family-name" value="${GovBB.D['lastname']||''}" />
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="nrn">National Registration Number (NRN)</label>
        <p class="govbb-hint">Your 11-character NRN, for example 110915-0048.</p>
        <input class="govbb-input" type="text" id="nrn" name="nrn" data-field="nrn" value="${GovBB.D['nrn']||''}" placeholder="110915-0048" style="max-width:14rem;" />
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="nin">National Insurance Number (NIN)</label>
        <p class="govbb-hint">Your NIS number, found on your NIS card or benefit statement.</p>
        <input class="govbb-input" type="text" id="nin" name="nin" data-field="nin" value="${GovBB.D['nin']||''}" style="max-width:14rem;" />
      </div>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Date of birth</legend>
        <p class="govbb-hint">For example, 15 09 1985</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="dob-day">Day</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="dob-day" name="dob-day" data-field="dob-day" inputmode="numeric" value="${GovBB.D['dob-day']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="dob-month">Month</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="dob-month" name="dob-month" data-field="dob-month" inputmode="numeric" value="${GovBB.D['dob-month']||''}" /></div>

        ${GovBB.summaryRow('Address', [GovBB.D['address-line1'],GovBB.D['address-line2']].filter(Boolean).join(', '), 'contact')}
        ${GovBB.summaryRow('Parish', GovBB.D['parish'], 'contact')}
        ${GovBB.summaryRow('Mobile', GovBB.D['phone-mobile'], 'contact')}
        ${GovBB.summaryRow('Email', GovBB.D['email'], 'contact')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Educational records</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${Array.from({length:ec},(_,i)=>i+1).map(i=>GovBB.summaryRow('Institution '+i, [GovBB.D['edu-inst-'+i],GovBB.D['edu-country-'+i],(GovBB.D['edu-from-'+i]||'')+'–'+(GovBB.D['edu-to-'+i]||'')].filter(Boolean).join(', '), 'educational-records')).join('')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Qualifications</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${Array.from({length:qc},(_,i)=>i+1).map(i=>GovBB.summaryRow('Qualification '+i, [GovBB.D['qual-subj-'+i],GovBB.D['qual-body-'+i],GovBB.D['qual-grade-'+i]].filter(Boolean).join(' – '), 'qualifications')).join('')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Work experience</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${Array.from({length:wc},(_,i)=>i+1).map(i=>GovBB.summaryRow('Employment '+i, [GovBB.D['work-position-'+i],GovBB.D['work-employer-'+i]].filter(Boolean).join(' at '), 'work-experience')).join('')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Other information</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Skills', skills||'None selected', 'other-info')}
        ${GovBB.summaryRow('Youth/community experience', GovBB.D['youth-orgs'], 'other-info')}
        ${GovBB.summaryRow('Positions of responsibility', GovBB.D['positions-resp'], 'other-info')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">References</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Reference 1', GovBB.D['ref1-name'], 'references')}
        ${GovBB.summaryRow('Reference 1 contact', GovBB.D['ref1-contact'], 'references')}
        ${GovBB.summaryRow('Reference 2', GovBB.D['ref2-name'], 'references')}
        ${GovBB.summaryRow('Reference 2 contact', GovBB.D['ref2-contact'], 'references')}
      </dl>

      <div style="background:var(--color-yellow-20);border-left:4px solid var(--color-yellow-40);padding:var(--spacing-s) var(--spacing-m);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body">By sending this application you confirm that the information you have given is true and accurate.</p>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Send application</button>
      </div>
    </div>`;
  },

  'confirmation': () => {
    const ref = 'MoE-TT-' + Math.floor(10000 + Math.random() * 90000);
    GovBB.D['ref-number'] = GovBB.D['ref-number'] || ref;
    return `
    <div>
      <div style="background:var(--color-teal-10);border-left:6px solid var(--color-teal-40);padding:var(--spacing-m) var(--spacing-l);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Application sent</h1>
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your reference number is</p>
        <p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);letter-spacing:0.05em;">${GovBB.D['ref-number']}</p>
        <p class="govbb-hint" style="margin-top:var(--spacing-xs);">Keep this number — you may need it if you contact us.</p>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ol class="govbb-text-body" style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);">
        <li style="margin-bottom:var(--spacing-s);">The Ministry will review your application within <strong>10 working days</strong>.</li>
        <li style="margin-bottom:var(--spacing-s);">If shortlisted, we will contact you to arrange an interview.</li>
        <li style="margin-bottom:var(--spacing-s);">A temporary teaching contract will be offered once all checks are complete.</li>
      </ol>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">If you do not hear from us within 10 working days, call <strong>+1 (246) 430-2700</strong> and quote your reference number.</p>
      <a href="../index.html" class="govbb-link">Return to Ministry of Education services</a>
    </div>`;
  }
};

const REQUIRED = {
  'personal-details': [
    {id:'firstname',      msg:'Enter your first name'},
    {id:'lastname',       msg:'Enter your last name'},
    {id:'nrn',            msg:'Enter your National Registration Number'},
    {id:'dob-day',        msg:'Enter the day of your date of birth'},
    {id:'dob-month',      msg:'Enter the month of your date of birth'},
    {id:'dob-year',       msg:'Enter the year of your date of birth'},
  ],
  'contact': [
    {id:'address-line1', msg:'Enter your address'},
    {id:'parish',        msg:'Choose your parish'},
    {id:'phone-mobile',  msg:'Enter your mobile number'},
    {id:'email',         msg:'Enter your email address'},
  ],
  'educational-records': [
    {id:'edu-inst-1', msg:'Enter the name of at least one institution'},
  ],
  'qualifications': [
    {id:'qual-subj-1', msg:'Enter at least one subject passed'},
  ],
  'references': [
    {id:'ref1-name',    msg:'Enter the name of your first reference'},
    {id:'ref1-contact', msg:'Enter a contact number for your first reference'},
    {id:'ref2-name',    msg:'Enter the name of your second reference'},
    {id:'ref2-contact', msg:'Enter a contact number for your second reference'},
  ],
  'declaration': [
    {id:'decl-accurate', msg:'You must confirm the information is accurate'},
    {id:'decl-consent',  msg:'You must agree to the Ministry checking your details'},
    {id:'decl-criminal', msg:'You must confirm the criminal record statement'},
    {id:'decl-updates',  msg:'You must agree to notify us of any changes'},
  ],
};

GovBB.init({
  appElementId: 'app',
  flow: FLOW,
  pages: PAGES,
  validate: function(page) {
    var rules = REQUIRED[page];
    if (!rules) return [];
    return rules.filter(function(r) {
      var el = document.getElementById(r.id);
      if (!el) return false;
      if (el.type === 'checkbox') return !el.checked;
      return !el.value.trim();
    });
  }
});
</script>
</body>
</html>
