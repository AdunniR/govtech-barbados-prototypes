<script>
/* ───────── Form-specific configuration ───────── */
const FORM_NAME = 'NIS Online Social Security Service Registration Form';

/* ───────── Dynamic flow ───────── */
function getFlow() {
  if (GovBB.D['residency'] === 'Overseas') {
    return ['start', 'residency-gate', 'applicant-details', 'overseas-notarial', 'declaration', 'check', 'confirmation'];
  }
  return ['start', 'residency-gate', 'applicant-details', 'declaration', 'check', 'confirmation'];
}

/* ───────── Mailing address fields helper ───────── */
function mailingAddressFields() {
  return `
    <div class="space-y-6 border-l-4 border-bb-blue-40 pl-s mt-4">
      <p class="font-bold text-[1.25rem]">Mailing address</p>
      ${GovBB.textField('mailing-street', 'Street address')}
      ${GovBB.textField('mailing-city', 'City or district', { hint: 'Optional' })}
      ${GovBB.selectField('mailing-parish', 'Parish', GovBB.PARISHES)}
      ${GovBB.textField('mailing-postal', 'Postal code', { hint: 'For example, BB11000', placeholder: 'BB11000' })}
      ${GovBB.textField('mailing-country', 'Country')}
    </div>`;
}

/* ───────── ID-specific fields helper ───────── */
function idFields() {
  const idType = GovBB.D['id-type'];
  if (idType === 'Barbados National ID Card') {
    return `
      <div class="space-y-6 border-l-4 border-bb-blue-40 pl-s">
        ${GovBB.textField('nrn', 'National Registration Number (NRN)', {
          hint: 'Your National Registration Number. For example, 870315-1234',
          placeholder: '870315-1234'
        })}
      </div>`;
  }
  if (idType === 'Passport') {
    return `
      <div class="space-y-6 border-l-4 border-bb-blue-40 pl-s">
        ${GovBB.textField('passport-number', 'Passport number')}
        ${GovBB.dateField('passport-issued', 'Date issued', 'For example, 27 03 2007')}
        ${GovBB.dateField('passport-expired', 'Date expires', 'For example, 27 03 2030')}
        ${GovBB.textField('passport-country', 'Country of issue')}
      </div>`;
  }
  return '';
}

/* ───────── Today's date helper ───────── */
function todayFormatted() {
  const d = new Date();
  const day = String(d.getDate()).padStart(2, '0');
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

/* ───────── Summary helpers ───────── */
function formatDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '—';
  return [d, m, y].filter(Boolean).join(' / ');
}

function summarySection(title, rows) {
  const visibleRows = rows.filter(r => r !== null);
  if (!visibleRows.length) return '';
  return `
    <div class="space-y-4">
      <h2 class="font-bold text-[1.5rem] mt-8">${title}</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-b border-bb-grey-00">
        ${visibleRows.join('')}
      </dl>
    </div>`;
}

/* ───────── Page templates ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div class="space-y-8">
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Register for the NIS Online Social Security Service</h1>
      <p class="text-[1.25rem] text-bb-mid-grey-00">Last updated: 24 March 2026</p>

      <p class="text-[1.25rem]">
        Use this form to register for online access to your NIS account. Once registered, you can check your contributions, apply for benefits, and manage your details online — without visiting an NIS office.
      </p>
      <p class="text-[1.25rem]">
        You must already have an NIS number to register. If you do not have one, you will need to visit an NIS office first.
      </p>

      <div class="space-y-4">
        <h2 class="font-bold text-[2rem]">Who can use this form</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
          <li>Barbados residents with a valid NIS number</li>
          <li>Overseas applicants with a valid NIS number (your form must be witnessed by a Notary Public)</li>
        </ul>
      </div>

      <div class="space-y-4">
        <h2 class="font-bold text-[2rem]">What you will need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
          <li>Your NIS number (6 digits — found on your NIS card or correspondence)</li>
          <li>Your Barbados National ID Card <strong>or</strong> valid passport</li>
          <li>Your home address</li>
          <li>Your email address (we will send your login details here)</li>
          <li>If you live overseas: details of a Notary Public who will witness your application</li>
        </ul>
      </div>

      <div class="space-y-4">
        <h2 class="font-bold text-[2rem]">How to apply</h2>
        <p class="text-[1.25rem]">Fill in this form online. It takes about 10 minutes.</p>
        ${GovBB.startBtn('Complete the online form')}
      </div>
    </div>`,

  /* ── Residency gate ── */
  'residency-gate': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Before you start</h1>
      <div class="space-y-8">
        ${GovBB.radioGroup('residency', 'Where do you currently live?', [
          { value: 'In Barbados', label: 'In Barbados' },
          { value: 'Overseas', label: 'Overseas' }
        ])}
        ${GovBB.radioGroup('id-type', 'What type of ID do you have?', [
          { value: 'Barbados National ID Card', label: 'Barbados National ID Card' },
          { value: 'Passport', label: 'Passport' }
        ])}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Applicant details ── */
  'applicant-details': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your details</h1>
      <div class="space-y-8">

        <fieldset class="space-y-6">
          <legend class="font-bold text-[1.5rem] mb-4">Your name</legend>
          ${GovBB.textField('last-name', 'Last name')}
          ${GovBB.textField('first-name', 'First name')}
          ${GovBB.textField('middle-name', 'Middle name(s)', { hint: 'Optional — leave blank if you do not have a middle name' })}
        </fieldset>

        <div class="space-y-6">
          ${GovBB.textField('nis-number', 'NIS number', {
            hint: 'Your 6-digit National Insurance Number. For example, 123456',
            placeholder: '123456',
            inputmode: 'numeric',
            maxlength: '6'
          })}
        </div>

        <div id="id-fields-container" class="space-y-6">
          ${idFields()}
        </div>

        <fieldset class="space-y-6">
          <legend class="font-bold text-[1.5rem] mb-4">Your home address</legend>
          ${GovBB.textField('street-address', 'Street address')}
          ${GovBB.textField('city-district', 'City or district', { hint: 'Optional' })}
          ${GovBB.selectField('parish', 'Parish', GovBB.PARISHES)}
          ${GovBB.textField('postal-code', 'Postal code', { hint: 'For example, BB11000', placeholder: 'BB11000' })}
          ${GovBB.textField('country', 'Country', { placeholder: 'Barbados' })}
        </fieldset>

        <fieldset class="space-y-4">
          <legend class="font-bold text-[1.5rem] mb-4">Mailing address</legend>
          <div class="flex items-start gap-4">
            <div class="relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-sm transition-all hover:cursor-pointer hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100"
                 onclick="GovBB.toggleCheckbox('mailing-same'); GovBB.render();">
              <input type="checkbox" id="mailing-same" name="mailing-same"
                     class="sr-only"
                     ${GovBB.D['mailing-same'] ? 'checked' : ''}>
              ${GovBB.D['mailing-same'] ? `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>` : ''}
            </div>
            <label for="mailing-same" class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer pt-2">
              My mailing address is the same as my home address
            </label>
          </div>
          ${!GovBB.D['mailing-same'] ? mailingAddressFields() : ''}
        </fieldset>

        <fieldset class="space-y-6">
          <legend class="font-bold text-[1.5rem] mb-4">Contact details</legend>
          ${GovBB.telField('phone-home', 'Home phone number', { hint: 'Optional', placeholder: '246-555-1234' })}
          ${GovBB.telField('phone-mobile', 'Mobile number', { placeholder: '246-555-1234' })}
          ${GovBB.telField('phone-work', 'Work phone number', { hint: 'Optional', placeholder: '246-555-1234' })}
          ${GovBB.emailField('email', 'Email address', { hint: 'We will send your login details to this address' })}
          ${GovBB.emailField('email-confirm', 'Confirm email address')}
        </fieldset>

        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Overseas notarial ── */
  'overseas-notarial': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Notary Public details</h1>
      <p class="text-[1.25rem] mb-8">Because you live overseas, a Notary Public must witness your application. Ask your Notary Public to complete this section.</p>
      <div class="space-y-8">
        ${GovBB.textField('notary-name', 'Notary Public name')}
        ${GovBB.textField('jurisdiction', 'Jurisdiction', { hint: 'The country or territory where the notarisation took place' })}
        ${GovBB.dateField('notarial-date', 'Date of notarisation', 'For example, 27 03 2026')}

        <div class="space-y-4">
          <p class="font-bold text-[1.25rem]">Notary Public seal or stamp</p>
          <p class="text-[1.25rem] text-bb-mid-grey-00">Upload an image of the notary seal or stamp. Accepted formats: JPG, PNG, PDF. Maximum size: 5MB.</p>
          <label for="notary-seal-upload" class="block text-[1.25rem] font-bold text-bb-black-00">Upload notary seal or stamp image</label>
          <p class="text-[1.25rem] text-bb-mid-grey-00">Upload a JPG, PNG or PDF file under 5MB</p>
          <div class="relative inline-flex w-full max-w-sm rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
            <input type="file" id="notary-seal-upload" name="notary-seal-upload"

              class="w-full min-w-0 p-s outline-none rounded-[inherit]"
              onchange="GovBB.D['notary-seal-filename'] = this.files[0] ? this.files[0].name : ''">
          </div>
          ${GovBB.D['notary-seal-filename'] ? `<p class="text-[1.25rem] text-bb-mid-grey-00">Uploaded: ${GovBB.D['notary-seal-filename']}</p>` : ''}
        </div>

        <div class="flex items-start gap-4">
          <div class="relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-sm transition-all hover:cursor-pointer hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100"
               onclick="GovBB.toggleCheckbox('notarial-certified'); GovBB.render();">
            <input type="checkbox" id="notarial-certified" name="notarial-certified"
                   class="sr-only"
                   ${GovBB.D['notarial-certified'] ? 'checked' : ''}>
            ${GovBB.D['notarial-certified'] ? `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>` : ''}
          </div>
          <label for="notarial-certified" class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer pt-2">
            I certify that the applicant's identity and signature have been verified
          </label>
        </div>
        <p id="notarial-certified-error" class="text-bb-red-00 text-[1.25rem] hidden">Certification – You must certify that the applicant's identity has been verified</p>

        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Declaration ── */
  'declaration': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Declaration</h1>
      <div class="space-y-8">
        <div class="space-y-2 mb-6">
          <p class="text-[1.25rem]"><span class="font-bold">Applicant's name:</span> ${[GovBB.D['first-name'], GovBB.D['middle-name'], GovBB.D['last-name']].filter(Boolean).join(' ') || '—'}</p>
          <p class="text-[1.25rem]"><span class="font-bold">Date:</span> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
        </div>

        <div class="bg-bb-blue-10 border-l-4 border-bb-blue-40 p-s space-y-3">
          <p class="text-[1.25rem]">
            I declare that the information I have given in this form is true and correct to the best of my knowledge and belief.
          </p>
          <p class="text-[1.25rem]">
            I give NIS permission to use my email address to send me notifications about my NIS account.
          </p>
        </div>

        <div class="flex items-start gap-4">
          <div class="relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-sm transition-all hover:cursor-pointer hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100"

            <input type="checkbox" id="email-consent" name="email-consent"

                   ${GovBB.D['email-consent'] ? 'checked' : ''}>
            ${GovBB.D['email-consent'] ? `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>` : ''}

        ${GovBB.checkboxItem('declaration-agree', 'I confirm that the information I have given is true and complete to the best of my knowledge.')}

        <div class="mt-8 flex gap-4">
          <button type="button" onclick="back()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-colors duration-200 outline-none bg-bb-grey-00 text-bb-black-00 hover:bg-[#c5ccd4] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Back</button>
          <button type="button" onclick="next()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] hover:shadow-[inset_0_0_0_4px_rgba(222,245,246,0.10)] active:bg-[#0a4549] active:shadow-[inset_0_0_0_3px_rgba(0,0,0,0.20)] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Submit registration</button>
        </div>
      </div>
    </form>`,

  /* ── Check your answers ── */
  'check': () => {
    const D = GovBB.D;
    const idType = D['id-type'] || '';
    const isOverSeas = D['residency'] === 'Overseas';
    const mailingSame = D['mailing-same'];

    function row(label, val, page) {
      const display = val || '<span class="text-bb-mid-grey-00">Not provided</span>';
      return GovBB.summaryRow(label, display, page);
    }

    const registrationRows = [
      row('Where you live', D['residency'], 'residency-gate'),
      row('Type of ID', D['id-type'], 'residency-gate'),
    ];

    const personalRows = [
      row('Last name', D['last-name'], 'applicant-details'),
      row('First name', D['first-name'], 'applicant-details'),
      D['middle-name'] ? row('Middle name(s)', D['middle-name'], 'applicant-details') : null,
      row('NIS number', D['nis-number'], 'applicant-details'),
      idType === 'Barbados National ID Card' ? row('National Registration Number', D['nrn'], 'applicant-details') : null,
      idType === 'Passport' ? row('Passport number', D['passport-number'], 'applicant-details') : null,
      idType === 'Passport' ? row('Passport date issued', formatDate('passport-issued'), 'applicant-details') : null,
      idType === 'Passport' ? row('Passport expiry date', formatDate('passport-expired'), 'applicant-details') : null,
      idType === 'Passport' ? row('Country of issue', D['passport-country'], 'applicant-details') : null,
    ].filter(Boolean);

    const homeAddressRows = [
      row('Street address', D['street-address'], 'applicant-details'),
      D['city-district'] ? row('City or district', D['city-district'], 'applicant-details') : null,
      row('Parish', D['parish'], 'applicant-details'),
      row('Postal code', D['postal-code'], 'applicant-details'),
      row('Country', D['country'], 'applicant-details'),
    ].filter(Boolean);

    const mailingRows = mailingSame
      ? [row('Mailing address', 'Same as home address', 'applicant-details')]
      : [
          row('Mailing street address', D['mailing-street'], 'applicant-details'),
          D['mailing-city'] ? row('Mailing city or district', D['mailing-city'], 'applicant-details') : null,
          row('Mailing parish', D['mailing-parish'], 'applicant-details'),
          row('Mailing postal code', D['mailing-postal'], 'applicant-details'),
          row('Mailing country', D['mailing-country'], 'applicant-details'),
        ].filter(Boolean);

    const contactRows = [
      D['phone-home'] ? row('Home phone', D['phone-home'], 'applicant-details') : null,
      row('Mobile number', D['phone-mobile'], 'applicant-details'),
      D['phone-work'] ? row('Work phone', D['phone-work'], 'applicant-details') : null,
      row('Email address', D['email'], 'applicant-details'),
    ].filter(Boolean);

    const notarialRows = isOverSeas ? [
      row('Notary Public name', D['notary-name'], 'overseas-notarial'),
      row('Jurisdiction', D['jurisdiction'], 'overseas-notarial'),
      row('Date of notarisation', formatDate('notarial-date'), 'overseas-notarial'),
      row('Identity certified', D['notarial-certified'] ? 'Yes' : 'No', 'overseas-notarial'),
    ] : [];

    return `
      ${GovBB.backLink()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Check your answers before sending your registration</h1>
      <div class="space-y-8">
        ${summarySection('Registration details', registrationRows)}
        ${summarySection('Personal details', personalRows)}
        ${summarySection('Home address', homeAddressRows)}
        ${summarySection('Mailing address', mailingRows)}
        ${summarySection('Contact details', contactRows)}
        ${isOverSeas ? summarySection('Overseas notarial details', notarialRows) : ''}
        <div class="pt-4">
          <p class="text-[1.25rem] mb-6">By sending this registration you confirm that the information you have given is correct and complete.</p>
          ${GovBB.continueBtn('Submit registration')}
        </div>
      </div>`;
  },

  /* ── Confirmation ── */
  'confirmation': () => `
    <div class="space-y-8">
      <div class="bg-bb-teal-00 text-bb-white-00 p-8 rounded-sm space-y-4">
        <h1 class="font-bold text-[3.5rem] leading-[1.15]">Registration submitted</h1>
        <p class="text-[1.5rem]">Your reference number</p>
        <p class="text-[2rem] font-bold">${window.__refNumber || 'OSS-' + Math.random().toString(36).substring(2, 8).toUpperCase()}</p>
      </div>

      <div class="space-y-4">
        <h2 class="font-bold text-[2rem]">What happens next</h2>
        <p class="text-[1.25rem]">We will review your registration and set up your online account.</p>
        <p class="text-[1.25rem]">We will send your login details to <strong>${GovBB.D['email'] || 'your email address'}</strong> within 5 working days.</p>
        <p class="text-[1.25rem]">If we need more information, we will contact you by email or phone.</p>
      </div>

      <div class="space-y-4">
        <h2 class="font-bold text-[2rem]">Save your reference number</h2>
        <p class="text-[1.25rem]">Keep your reference number safe. You will need it if you contact us about your registration.</p>
      </div>

      <div class="space-y-2">
        <a href="#" onclick="GovBB.nav('start'); return false;"
          class="inline-flex outline-none underline-offset-2 underline hover:no-underline active:bg-bb-yellow-100 focus-visible:bg-bb-yellow-100 text-bb-teal-00 hover:text-bb-black-00 hover:bg-bb-teal-10">
          Go back to the start
        </a>
      </div>
    </div>`
};

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'residency-gate') {
    if (!D['residency']) errors.push({ id: 'residency', msg: 'Where you live – Select where you currently live' });
    if (!D['id-type']) errors.push({ id: 'id-type', msg: 'Type of ID – Select what type of ID you have' });
  }

  if (pageId === 'applicant-details') {
    if (!D['last-name']) errors.push({ id: 'last-name', msg: 'Last name – Enter your last name' });
    if (!D['first-name']) errors.push({ id: 'first-name', msg: 'First name – Enter your first name' });
    if (!D['nis-number']) errors.push({ id: 'nis-number', msg: 'NIS number – Enter your NIS number' });
    else if (!/^\d{6}$/.test(D['nis-number'].trim())) errors.push({ id: 'nis-number', msg: 'NIS number – Enter a valid 6-digit NIS number' });

    if (D['id-type'] === 'Barbados National ID Card') {
      if (!D['nrn']) errors.push({ id: 'nrn', msg: 'National Registration Number – Enter your NRN' });
      else if (!/^\d{6}-\d{4}$/.test(D['nrn'].trim())) errors.push({ id: 'nrn', msg: 'National Registration Number – Enter a valid NRN in the format 870315-1234' });
    }

    if (D['id-type'] === 'Passport') {
      if (!D['passport-number']) errors.push({ id: 'passport-number', msg: 'Passport number – Enter your passport number' });
      if (!D['passport-issued-day'] || !D['passport-issued-month'] || !D['passport-issued-year']) {
        errors.push({ id: 'passport-issued-day', msg: 'Date issued – Enter the date your passport was issued' });
      }
      if (!D['passport-expired-day'] || !D['passport-expired-month'] || !D['passport-expired-year']) {
        errors.push({ id: 'passport-expired-day', msg: 'Date expires – Enter the date your passport expires' });
      }
      if (!D['passport-country']) errors.push({ id: 'passport-country', msg: 'Country of issue – Enter the country that issued your passport' });
    }

    if (!D['street-address']) errors.push({ id: 'street-address', msg: 'Street address – Enter your street address' });
    if (!D['parish']) errors.push({ id: 'parish', msg: 'Parish – Select your parish' });
    if (D['postal-code'] && D['postal-code'].trim() && !/^BB\d{5}$/i.test(D['postal-code'].trim())) errors.push({ id: 'postal-code', msg: 'Postal code – Enter a valid Barbados postal code, for example BB11000' });
    if (!D['country']) errors.push({ id: 'country', msg: 'Country – Enter your country' });

    if (!D['mailing-same']) {
      if (!D['mailing-street']) errors.push({ id: 'mailing-street', msg: 'Mailing street address – Enter your mailing street address' });
      if (!D['mailing-parish']) errors.push({ id: 'mailing-parish', msg: 'Mailing parish – Select your mailing parish' });
      if (D['mailing-postal'] && D['mailing-postal'].trim() && !/^BB\d{5}$/i.test(D['mailing-postal'].trim())) errors.push({ id: 'mailing-postal', msg: 'Mailing postal code – Enter a valid postal code, for example BB11000' });
      if (!D['mailing-country']) errors.push({ id: 'mailing-country', msg: 'Mailing country – Enter your mailing country' });
    }

    if (!D['phone-mobile']) errors.push({ id: 'phone-mobile', msg: 'Mobile number – Enter your mobile number' });
    if (!D['email']) errors.push({ id: 'email', msg: 'Email address – Enter your email address' });
    if (!D['email-confirm']) errors.push({ id: 'email-confirm', msg: 'Confirm email address – Re-enter your email address' });
    if (D['email'] && D['email-confirm'] && D['email'].trim().toLowerCase() !== D['email-confirm'].trim().toLowerCase()) {
      errors.push({ id: 'email-confirm', msg: 'Confirm email address – Email addresses do not match' });
    }
  }

  if (pageId === 'overseas-notarial') {
    if (!D['notary-name']) errors.push({ id: 'notary-name', msg: 'Notary Public name – Enter the name of the Notary Public' });
    if (!D['jurisdiction']) errors.push({ id: 'jurisdiction', msg: 'Jurisdiction – Enter the jurisdiction' });
    if (!D['notarial-date-day'] || !D['notarial-date-month'] || !D['notarial-date-year']) {
      errors.push({ id: 'notarial-date-day', msg: 'Date of notarisation – Enter the date of notarisation' });
    }
    if (!D['notarial-certified']) {
      errors.push({ id: 'notarial-certified-error', msg: 'Certification – You must certify that the applicant\'s identity has been verified' });
      // Show the inline error too
      setTimeout(() => {
        const el = document.getElementById('notarial-certified-error');
        if (el) el.classList.remove('hidden');
      }, 50);
    }
  }

  if (pageId === 'declaration') {
    if (!D['email-consent']) {
      errors.push({ id: 'email-consent-error', msg: 'Email consent – You must agree to receive email notifications to continue' });
      setTimeout(() => {
        const el = document.getElementById('email-consent-error');
        if (el) el.classList.remove('hidden');
      }, 50);
    }
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  flow: ['start', 'residency-gate', 'applicant-details', 'declaration', 'check', 'confirmation'],
  pages: PAGES,
  validate: validate,
  getFlow: getFlow,
  onRadioChange: function(name, value) {
    if (name === 'residency' || name === 'id-type') {
      setTimeout(() => {
        const currentPage = GovBB._currentPage || 'residency-gate';
        if (currentPage === 'applicant-details') {
          GovBB.render();
        }
      }, 10);
    }
  }
});
</script>
</body>
</html>
