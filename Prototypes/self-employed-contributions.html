<script src="/assets/govbb-framework.js"></script>
<script>
const FORM_NAME = 'Contributions Payment Certificate — Self-employed Persons';
const DEADLINE_MONTH = 0; // January
const DEADLINE_DAY = 15;

// Rows stored as array in GovBB.D['contribution-rows']
function getRows() {
  return GovBB.D['contribution-rows'] || [{ year: '', amount: '' }];
}

function saveRows(rows) {
  GovBB.D['contribution-rows'] = rows;
}

function calcLateInterest(year, amount) {
  if (!year || !amount) return 0;
  const yearNum = parseInt(year);
  const now = new Date();
  const deadline = new Date(yearNum + 1, DEADLINE_MONTH, DEADLINE_DAY);
  if (now <= deadline) return 0;
  const yearsLate = (now - deadline) / (1000 * 60 * 60 * 24 * 365.25);
  return parseFloat((parseFloat(amount) * 0.05 * Math.max(1, Math.ceil(yearsLate))).toFixed(2));
}

function isRowLate(year) {
  if (!year) return false;
  const yearNum = parseInt(year);
  const now = new Date();
  const deadline = new Date(yearNum + 1, DEADLINE_MONTH, DEADLINE_DAY);
  return now > deadline;
}

function renderContribGrid() {
  const rows = getRows();
  let total = 0;
  let totalInterest = 0;
  let anyLate = false;

  const rowsHtml = rows.map((row, i) => {
    const interest = calcLateInterest(row.year, row.amount);
    const late = isRowLate(row.year);
    if (late) anyLate = true;
    const amt = parseFloat(row.amount) || 0;
    total += amt;
    totalInterest += interest;
    return `
      <tr class="${late ? 'bg-bb-red-10' : ''}">
        <td class="p-2">
          <input type="text" inputmode="numeric" maxlength="4" placeholder="YYYY"
            class="w-full border-2 border-bb-black-00 rounded-sm p-2 text-[1rem] outline-none focus:ring-4 focus:ring-bb-teal-100"
            value="${row.year || ''}"
            oninput="updateRow(${i}, 'year', this.value)">
        </td>
        <td class="p-2">
          <div class="relative flex items-center border-2 border-bb-black-00 rounded-sm">
            <span class="pl-2 text-bb-mid-grey-00">$</span>
            <input type="number" min="0" step="0.01" placeholder="0.00"
              class="w-full p-2 text-[1rem] outline-none bg-transparent"
              value="${row.amount || ''}"
              oninput="updateRow(${i}, 'amount', this.value)">
          </div>
        </td>
        ${late ? `<td class="p-2 text-bb-red-00 font-bold text-[1rem]">$${interest.toFixed(2)}<br><span class="text-[0.75rem] font-normal">Late fee</span></td>` : '<td class="p-2 text-bb-mid-grey-00 text-[1rem]">—</td>'}
        <td class="p-2">
          ${rows.length > 1 ? `<button type="button" onclick="removeRow(${i})" class="text-bb-red-00 underline text-[1rem] hover:text-bb-black-00">Remove</button>` : ''}
        </td>
      </tr>`;
  }).join('');

  const grandTotal = total + totalInterest;

  return `
    <div>
      <p class="font-bold text-[1.25rem] mb-2">Contribution years</p>
      ${anyLate ? `<div class="warning-banner mb-4"><p class="font-bold">Some years are past the payment deadline</p><p>A late interest fee of 5% per year applies to contributions paid after 15 January following the contribution year.</p></div>` : ''}
      <table class="earnings-table mb-4">
        <thead>
          <tr>
            <th>Year</th>
            <th>Contributions Payable (BDS$)</th>
            <th>Late Interest</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="contrib-rows">${rowsHtml}</tbody>
        <tfoot>
          <tr class="total-row">
            <td class="p-2 font-bold" colspan="1">Total</td>
            <td class="p-2 font-bold">$${total.toFixed(2)}</td>
            <td class="p-2 font-bold text-bb-red-00">${anyLate ? '$' + totalInterest.toFixed(2) : '—'}</td>
            <td></td>
          </tr>
          ${anyLate ? `<tr class="bg-bb-teal-10"><td class="p-2 font-bold" colspan="2">Total Amount Payable (incl. interest)</td><td class="p-2 font-bold text-bb-teal-00 text-[1.25rem]">$${grandTotal.toFixed(2)}</td><td></td></tr>` : ''}
        </tfoot>
      </table>
      <button type="button" onclick="addRow()"
        class="inline-flex items-center gap-2 text-[1.25rem] text-bb-teal-00 underline hover:text-bb-black-00 hover:no-underline">
        + Add another year
      </button>
    </div>`;
}

function addRow() {
  const rows = getRows();
  rows.push({ year: '', amount: '' });
  saveRows(rows);
  GovBB.render();
}

function removeRow(i) {
  const rows = getRows();
  rows.splice(i, 1);
  saveRows(rows);
  GovBB.render();
}

function updateRow(i, field, value) {
  const rows = getRows();
  rows[i][field] = value;
  saveRows(rows);
  // Re-render table totals only
  const tbody = document.getElementById('contrib-rows');
  if (tbody) {
    // Refresh totals without full page re-render for smooth UX
    // Full re-render on blur instead
  }
}

function getTotalPayable() {
  const rows = getRows();
  let total = 0;
  rows.forEach(row => {
    total += parseFloat(row.amount) || 0;
    total += calcLateInterest(row.year, row.amount);
  });
  return total;
}

function hasAnyLate() {
  return getRows().some(row => isRowLate(row.year));
}

const PAGES = {
  'start': () => `
    <div class="space-y-8">
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Pay your annual NIS contributions as a self-employed person</h1>
      <p class="text-[1.25rem]">If you are self-employed, you must pay your NIS contributions every year. Use this form to submit your payment certificate.</p>
      <div class="bg-bb-red-10 border-l-4 border-bb-red-00 p-4">
        <p class="font-bold">Payment deadline: 15 January each year</p>
        <p>If you pay after 15 January, a late interest fee of 5% per year will be added to your contributions.</p>
      </div>
      <div>
        <h2 class="font-bold text-[1.5rem] mb-4">What you will need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
          <li>Your self-employed NIS number</li>
          <li>The contribution years you are paying for</li>
          <li>The amount of contributions payable for each year</li>
        </ul>
      </div>
      ${GovBB.startBtn()}
    </div>`,

  'identity': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your NIS details</h1>
      <div class="space-y-8">
        ${GovBB.textField('se-nis-number', 'Self-employed NIS number', { hint: 'Your 6-digit NIS number as registered under self-employment', inputmode: 'numeric', maxlength: '6' })}
        ${GovBB.textField('se-name', 'Your name as registered with NIS', { hint: 'Enter your name exactly as it appears on your NIS records.' })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'contributions-grid': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your contributions</h1>
      <div class="space-y-8">
        <p class="text-[1.25rem] text-bb-mid-grey-00">Enter the year and the amount of contributions you owe for each year. You can add multiple years.</p>
        ${renderContribGrid()}
        <div class="bg-bb-teal-10 border-2 border-bb-teal-00 rounded-md p-6">
          <p class="font-bold text-[1.25rem]">Total amount payable: <span class="text-bb-teal-00">BDS$ ${getTotalPayable().toFixed(2)}</span></p>
        </div>
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'declaration': () => {
    const anyLate = hasAnyLate();
    return `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Declaration</h1>
      <div class="space-y-8">
        <div class="space-y-2 mb-6">
          <p class="text-[1.25rem]"><span class="font-bold">Applicant's name:</span> ${GovBB.D['se-name'] || '—'}</p>
          <p class="text-[1.25rem]"><span class="font-bold">Date:</span> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
        </div>
        <div class="bg-bb-blue-10 border-l-4 border-bb-blue-40 p-6">
          <p class="text-[1.25rem]">I declare that the contributions stated in this certificate are due and payable by me as a self-employed person registered with the National Insurance Scheme. I understand that providing false information may result in prosecution.</p>
        </div>
        ${anyLate ? `
        <div>
          ${GovBB.checkboxItem('late-interest-consent', 'I understand that late interest fees apply to contributions paid after the 15 January deadline and I agree to pay the total amount including interest.')}
        </div>` : ''}
        ${GovBB.checkboxItem('declaration-agree', 'I confirm that the information I have given is true and complete to the best of my knowledge.')}
        <div class="mt-8 flex gap-4">
          <button type="button" onclick="back()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-colors duration-200 outline-none bg-bb-grey-00 text-bb-black-00 hover:bg-[#c5ccd4] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Back</button>
          <button type="button" onclick="next()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] hover:shadow-[inset_0_0_0_4px_rgba(222,245,246,0.10)] active:bg-[#0a4549] active:shadow-[inset_0_0_0_3px_rgba(0,0,0,0.20)] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Submit certificate and pay</button>
        </div>
      </div>
    </form>`;
  },

  'check': () => {
    const rows = getRows();
    const rowsHtml = rows.map(row => {
      const interest = calcLateInterest(row.year, row.amount);
      const late = isRowLate(row.year);
      return `<div class="summary-row"><dt>${row.year || 'Year not set'}</dt><dd>BDS$ ${parseFloat(row.amount || 0).toFixed(2)}${late ? ` + $${interest.toFixed(2)} interest` : ''}</dd><dd><a href="#" onclick="GovBB.nav('contributions-grid')" class="${GovBB.LINK_CLS}">Change</a></dd></div>`;
    }).join('');
    return `
    ${GovBB.backLink()}
    <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Check your answers</h1>
    <div class="space-y-8">
      <h2 class="font-bold text-[1.5rem]">Your NIS details</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('NIS number', GovBB.D['se-nis-number'], 'identity')}
        ${GovBB.summaryRow('Name', GovBB.D['se-name'], 'identity')}
      </dl>
      <h2 class="font-bold text-[1.5rem]">Contributions</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">${rowsHtml}</dl>
      <div class="bg-bb-teal-10 border-2 border-bb-teal-00 rounded-md p-6">
        <p class="font-bold text-[1.25rem]">Total amount payable: <span class="text-bb-teal-00">BDS$ ${getTotalPayable().toFixed(2)}</span></p>
      </div>
      ${GovBB.continueBtn('Submit Certificate and Pay')}
    </div>`;
  },

  'confirmation': () => `
    <div class="space-y-8">
      <div class="bg-bb-teal-00 text-bb-white-00 p-8 rounded-sm space-y-4">
        <h1 class="font-bold text-[3.5rem] leading-[1.15]">Certificate submitted</h1>
        <p class="text-[1.5rem]">Your reference number</p>
        <p class="text-[2rem] font-bold">${window.__refNumber || 'SECP-' + Math.random().toString(36).substring(2,8).toUpperCase()}</p>
      </div>
      <h2 class="font-bold text-[1.5rem]">What happens next</h2>
      <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
        <li>Your contributions payment certificate has been recorded.</li>
        <li>You will receive a receipt at your registered email address.</li>
        <li>Your next contribution deadline is 15 January ${new Date().getFullYear() + 1}.</li>
        <li>Keep your reference number safe.</li>
      </ul>
      <p class="text-[1.25rem]"><a href="#" onclick="GovBB.nav('start')" class="${GovBB.LINK_CLS}">Return to start</a></p>
    </div>`
};

function validate(pageId) {
  const D = GovBB.D;
  const errors = [];
  if (pageId === 'identity') {
    if (!D['se-nis-number']) errors.push({ id: 'se-nis-number', msg: 'NIS number – Enter your self-employed NIS number' });
    if (!D['se-name']) errors.push({ id: 'se-name', msg: 'Name – Enter your name as registered with NIS' });
  }
  if (pageId === 'contributions-grid') {
    const rows = getRows();
    const currentYear = new Date().getFullYear();
    let hasError = false;
    rows.forEach((row, i) => {
      if (!row.year) { errors.push({ id: 'contrib-rows', msg: `Row ${i+1} – Enter the contribution year` }); hasError = true; }
      else if (parseInt(row.year) > currentYear) { errors.push({ id: 'contrib-rows', msg: `Row ${i+1} – Year cannot be in the future` }); hasError = true; }
      if (!row.amount || parseFloat(row.amount) <= 0) { errors.push({ id: 'contrib-rows', msg: `Row ${i+1} – Enter a valid contribution amount` }); hasError = true; }
    });
  }
  if (pageId === 'declaration') {
    if (hasAnyLate() && !D['late-interest-consent']) errors.push({ id: 'late-interest-consent', msg: 'Late interest consent – You must agree to pay the late interest fees' });
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: ['start', 'identity', 'contributions-grid', 'declaration', 'check', 'confirmation'],
  pages: PAGES,
  validate: validate
});
</script>
