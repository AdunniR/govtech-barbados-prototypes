    </div>

<!-- Alpha banner -->
<div class="bg-bb-blue-10">
  <div class="container py-xs text-[1rem]">
    This page is in <a href="#" class="inline-flex outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00">Alpha</a>. Your feedback helps us improve.
  </div>
</div>

<!-- Main -->
<main>
  <div class="container py-l max-w-3xl" id="app"></div>
</main>

<!-- Footer -->
<footer class="bg-bb-blue-100 text-bb-white-00">
  <div class="container py-l text-[1rem]">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <p>&copy; 2024 Government of Barbados. All rights reserved.</p>
      <div class="flex gap-4">
        <a href="#" class="underline underline-offset-2 hover:no-underline text-bb-white-00">Privacy</a>
        <a href="#" class="underline underline-offset-2 hover:no-underline text-bb-white-00">Terms</a>
        <a href="#" class="underline underline-offset-2 hover:no-underline text-bb-white-00">Accessibility</a>
      </div>
    </div>
  </div>
</footer>

<script src="../assets/govbb-framework.js"></script>
<script>
const FORM_NAME = 'Self-Employment Registration';
const COUNTRIES = ['Afghanistan','Albania','Algeria','Andorra','Angola','Antigua and Barbuda','Argentina','Armenia','Australia','Austria','Azerbaijan','Bahamas','Bahrain','Bangladesh','Barbados','Belarus','Belgium','Belize','Benin','Bhutan','Bolivia','Bosnia and Herzegovina','Botswana','Brazil','Brunei','Bulgaria','Burkina Faso','Burundi','Cabo Verde','Cambodia','Cameroon','Canada','Central African Republic','Chad','Chile','China','Colombia','Comoros','Congo','Costa Rica','Croatia','Cuba','Cyprus','Czech Republic','Denmark','Djibouti','Dominica','Dominican Republic','Ecuador','Egypt','El Salvador','Equatorial Guinea','Eritrea','Estonia','Eswatini','Ethiopia','Fiji','Finland','France','Gabon','Gambia','Georgia','Germany','Ghana','Greece','Grenada','Guatemala','Guinea','Guinea-Bissau','Guyana','Haiti','Honduras','Hungary','Iceland','India','Indonesia','Iran','Iraq','Ireland','Israel','Italy','Jamaica','Japan','Jordan','Kazakhstan','Kenya','Kiribati','Kuwait','Kyrgyzstan','Laos','Latvia','Lebanon','Lesotho','Liberia','Libya','Liechtenstein','Lithuania','Luxembourg','Madagascar','Malawi','Malaysia','Maldives','Mali','Malta','Marshall Islands','Mauritania','Mauritius','Mexico','Micronesia','Moldova','Monaco','Mongolia','Montenegro','Morocco','Mozambique','Myanmar','Namibia','Nauru','Nepal','Netherlands','New Zealand','Nicaragua','Niger','Nigeria','North Korea','North Macedonia','Norway','Oman','Pakistan','Palau','Panama','Papua New Guinea','Paraguay','Peru','Philippines','Poland','Portugal','Qatar','Romania','Russia','Rwanda','Saint Kitts and Nevis','Saint Lucia','Saint Vincent and the Grenadines','Samoa','San Marino','Sao Tome and Principe','Saudi Arabia','Senegal','Serbia','Seychelles','Sierra Leone','Singapore','Slovakia','Slovenia','Solomon Islands','Somalia','South Africa','South Korea','South Sudan','Spain','Sri Lanka','Sudan','Suriname','Sweden','Switzerland','Syria','Taiwan','Tajikistan','Tanzania','Thailand','Timor-Leste','Togo','Tonga','Trinidad and Tobago','Tunisia','Turkey','Turkmenistan','Tuvalu','Uganda','Ukraine','United Arab Emirates','United Kingdom','United States','Uruguay','Uzbekistan','Vanuatu','Vatican City','Venezuela','Vietnam','Yemen','Zambia','Zimbabwe'];

const FLOW = ['start','personal-details','business-details','declaration','check','confirmation'];

const PAGES = {
  'start': () => `
    <div class="space-y-8">
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Register as a Self-Employed Person with NIS</h1>
      <p class="text-[1.25rem]">If you work for yourself in Barbados, use this service to register with the National Insurance and Social Security (NIS). Once registered, you can make contributions and access NIS benefits.</p>
      <div class="space-y-4">
        <h2 class="font-bold text-[1.5rem]">What you will need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
          <li>Your National Registration Number or Passport</li>
          <li>Your National Insurance Number</li>
          <li>Your business name and what your business does</li>
          <li>The date your business started</li>
          <li>Your email address and mobile number</li>
          <li>Your estimated monthly income</li>
        </ul>
      </div>
      <p class="text-[1.25rem] text-bb-mid-grey-00">It should take no longer than 10 minutes to complete this form.</p>
      ${GovBB.startBtn()}
    </div>`,

  'personal-details': () => {
    const idType = GovBB.D['id-type'] || '';
    const marital = GovBB.D['marital-status'] || '';
    const passportFields = idType === 'Passport' ? `
      <div class="space-y-6 mt-4 p-4 bg-bb-blue-10 rounded-sm">
        ${GovBB.textField('passport-number','Passport Number')}
        ${GovBB.dateField('passport-issued','Date Issued','For example, 01 06 2015')}
        ${GovBB.dateField('passport-expiry','Date Expired','For example, 01 06 2025')}
        ${GovBB.selectField('passport-country','Country Issued',COUNTRIES)}
      </div>` : '';
    const nrnField = (idType === '' || idType === 'National Registration Number') ? `
      ${GovBB.textField('nrn','National Registration Number',{hint:'Find this on your National ID card. Format: YYMMDD-XXXX',placeholder:'870315-1234'})}` : '';
    const maidenField = marital === 'Married' ? GovBB.textField('maiden-name','Maiden Name',{hint:'If your surname changed when you got married, enter your name before the change.'}) : '';

    return `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your personal details</h1>
      <div class="space-y-8">
        ${GovBB.selectField('title','Title (optional)',['Mr','Mrs','Miss','Ms','Professor','Doctor','Sir','Dame'])}
        ${GovBB.textField('first-name','First name')}
        ${GovBB.textField('middle-name','Middle name(s)',{hint:'Optional. Include all middle names.'})}
        ${GovBB.textField('last-name','Last name')}
        ${GovBB.radioGroup('marital-status','What is your marital status?',['Single','Married','Divorced','Separated','Widowed'])}
        ${maidenField}
        ${GovBB.radioGroup('gender','What is your gender?',['Male','Female'])}
        ${GovBB.dateField('dob','Date of birth','For example, 27 03 1985')}
        ${GovBB.textField('nis-number','National Insurance Number',{hint:'Find this on your NIS card or payslip.'})}
        <div class="space-y-4">
          ${GovBB.selectField('id-type','What identification do you have?',['National Registration Number','Passport'],{hint:'Select the document you will use to prove your identity.'})}
        </div>
        ${nrnField}
        ${passportFields}
        ${GovBB.textField('street-address','Street address')}
        ${GovBB.textField('district','District',{hint:'Village or district name. For example, Brittons Hill.'})}
        ${GovBB.selectField('parish','Parish',GovBB.PARISHES)}
        ${GovBB.emailField('email','Email address',{hint:'We will use this to contact you about your registration.'})}
        ${GovBB.telField('mobile','Mobile number',{hint:'For example, 246-555-1234',placeholder:'246-555-1234'})}
        ${GovBB.continueBtn()}
      </div>
    </form>`;
  },

  'business-details': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your business details</h1>
      <div class="space-y-8">
        ${GovBB.textField('business-name','Name of your business')}
        ${GovBB.textareaField('business-nature','What does your business do?',{hint:'Describe the main activity or service your business provides. For example, plumbing repairs, catering, freelance design.',rows:4})}
        ${GovBB.dateField('business-start','Date your business started','For example, 01 01 2020')}
        ${GovBB.textField('monthly-salary','Estimated monthly income (BDS$)',{hint:'NIS uses this to work out your contribution amount. Enter the amount you expect to earn each month.',inputmode:'numeric',placeholder:'2000'})}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'declaration': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Declaration</h1>
      <div class="space-y-8">
        <div class="space-y-2 mb-6">
          <p class="text-[1.25rem]"><span class="font-bold">Applicant's name:</span> ${[GovBB.D['first-name'], GovBB.D['middle-name'], GovBB.D['last-name']].filter(Boolean).join(' ') || '—'}</p>
          <p class="text-[1.25rem]"><span class="font-bold">Date:</span> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
        </div>
        <p class="text-[1.25rem]">I declare that the information I have given is true to the best of my knowledge and belief.</p>
        ${GovBB.radioGroup('field-officer','Did an NIS Field Officer help you fill in this form?',['No','Yes'],{hint:'If a Field Officer helped you, we need to record their code.'})}
        <div id="officer-code-wrap" style="display:none">
          ${GovBB.textField('officer-code','Field Officer code number',{hint:'Enter the code number of the NIS Field Officer (up to 2 digits).',inputmode:'numeric',maxlength:'2',width:'8rem'})}
        </div>
        ${GovBB.checkboxItem('declaration-agree', 'I confirm that the information I have given is true and complete to the best of my knowledge.')}
        <div class="mt-8 flex gap-4">
          <button type="button" onclick="back()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-colors duration-200 outline-none bg-bb-grey-00 text-bb-black-00 hover:bg-[#c5ccd4] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Back</button>
          <button type="button" onclick="next()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] hover:shadow-[inset_0_0_0_4px_rgba(222,245,246,0.10)] active:bg-[#0a4549] active:shadow-[inset_0_0_0_3px_rgba(0,0,0,0.20)] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Submit application</button>
        </div>
      </div>
    </form>`,

  'check': () => {
    const idType = GovBB.D['id-type'] || '';
    const idValue = idType === 'Passport'
      ? GovBB.D['passport-number']
      : GovBB.D['nrn'];
    return `
    <div>
      ${GovBB.backLink()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Check your answers before sending your application</h1>
      <div class="space-y-8">
        <h2 class="font-bold text-[1.5rem]">Personal details</h2>
        <dl>
          ${GovBB.summaryRow('Title', GovBB.D['title'], 'personal-details')}
          ${GovBB.summaryRow('First name', GovBB.D['first-name'], 'personal-details')}
          ${GovBB.summaryRow('Middle name(s)', GovBB.D['middle-name'], 'personal-details')}
          ${GovBB.summaryRow('Last name', GovBB.D['last-name'], 'personal-details')}
          ${GovBB.summaryRow('Marital status', GovBB.D['marital-status'], 'personal-details')}
          ${GovBB.D['marital-status']==='Married' ? GovBB.summaryRow('Maiden name', GovBB.D['maiden-name'], 'personal-details') : ''}
          ${GovBB.summaryRow('Gender', GovBB.D['gender'], 'personal-details')}
          ${GovBB.summaryRow('Date of birth', [GovBB.D['dob-day'],GovBB.D['dob-month'],GovBB.D['dob-year']].filter(Boolean).join(' / '), 'personal-details')}
          ${GovBB.summaryRow('National Insurance Number', GovBB.D['nis-number'], 'personal-details')}
          ${GovBB.summaryRow('Identification type', idType, 'personal-details')}
          ${GovBB.summaryRow(idType === 'Passport' ? 'Passport number' : 'National Registration Number', idValue, 'personal-details')}
        </dl>
        <h2 class="font-bold text-[1.5rem]">Address and contact</h2>
        <dl>
          ${GovBB.summaryRow('Street address', GovBB.D['street-address'], 'personal-details')}
          ${GovBB.summaryRow('District', GovBB.D['district'], 'personal-details')}
          ${GovBB.summaryRow('Parish', GovBB.D['parish'], 'personal-details')}
          ${GovBB.summaryRow('Email address', GovBB.D['email'], 'personal-details')}
          ${GovBB.summaryRow('Mobile number', GovBB.D['mobile'], 'personal-details')}
        </dl>
        <h2 class="font-bold text-[1.5rem]">Business details</h2>
        <dl>
          ${GovBB.summaryRow('Business name', GovBB.D['business-name'], 'business-details')}
          ${GovBB.summaryRow('Nature of business', GovBB.D['business-nature'], 'business-details')}
          ${GovBB.summaryRow('Date business started', [GovBB.D['business-start-day'],GovBB.D['business-start-month'],GovBB.D['business-start-year']].filter(Boolean).join(' / '), 'business-details')}
          ${GovBB.summaryRow('Estimated monthly income', GovBB.D['monthly-salary'] ? 'BDS$ ' + GovBB.D['monthly-salary'] : '', 'business-details')}
        </dl>
        ${GovBB.continueBtn('Submit application')}
      </div>
    </div>`;
  },

  'confirmation': () => `
    <div class="space-y-8">
      <div class="confirmation-panel">
        <h1 class="font-bold text-[2rem] leading-[1.15] mb-4">Application submitted</h1>
        <p class="text-[1.25rem]">Your reference number</p>
        <p class="text-[2rem] font-bold">${window.__refNumber || 'SE-' + Math.random().toString(36).substring(2,8).toUpperCase()}</p>
      </div>
      <h2 class="font-bold text-[1.5rem]">What happens next</h2>
      <p class="text-[1.25rem]">We got your application. NIS will review it and may contact you for more information.</p>
      <p class="text-[1.25rem]">Once your registration is confirmed, you will receive details about your contribution schedule and how to pay.</p>
      <h2 class="font-bold text-[1.5rem]">Contact NIS</h2>
      <p class="text-[1.25rem]">Phone: (246) 431-7400 or (246) 467-4647</p>
      <p class="text-[1.25rem]">Email: customer.service@bginis.gov.bb</p>
      <p class="text-[1.25rem]">Address: Frank Walcott Building, Culloden Road, St. Michael, Barbados</p>
    </div>`
};

function validate(pageId) {
  const D = GovBB.D;
  const errors = [];
  if (pageId === 'personal-details') {
    if (!D['first-name']) errors.push({id:'first-name', msg:'Enter your first name'});
    if (!D['last-name'])  errors.push({id:'last-name',  msg:'Enter your last name'});
    if (!D['nis-number']) errors.push({id:'nis-number', msg:'Enter your National Insurance Number'});
    if (!D['id-type'])    errors.push({id:'id-type',    msg:'Select your identification type'});
    if (D['id-type'] === 'National Registration Number' && !D['nrn'])
      errors.push({id:'nrn', msg:'Enter your National Registration Number'});
    if (D['id-type'] === 'Passport' && !D['passport-number'])
      errors.push({id:'passport-number', msg:'Enter your passport number'});
    if (!D['parish'])     errors.push({id:'parish',     msg:'Select your parish'});
    if (!D['email'])      errors.push({id:'email',      msg:'Enter your email address'});
  }
  if (pageId === 'business-details') {
    if (!D['business-name'])   errors.push({id:'business-name',   msg:'Enter your business name'});
    if (!D['business-nature']) errors.push({id:'business-nature', msg:'Describe what your business does'});
  }
  if (pageId === 'declaration') {
    if (!D['declaration-agree']) errors.push({id:'declaration-agree', msg:'Declaration – You must confirm the declaration to continue'});
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name, value) {
    if (name === 'marital-status' || name === 'id-type') {
      GovBB.render();
    }
    if (name === 'field-officer') {
      const wrap = document.getElementById('officer-code-wrap');
      if (wrap) wrap.style.display = value === 'Yes' ? '' : 'none';
    }
  }
});

</script>
</body>
</html>
