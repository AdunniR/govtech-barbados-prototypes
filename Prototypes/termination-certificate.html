.8301 55.222 17.3763C55.4577 16.9077 55.5756 16.3733 55.5756 15.773C55.5756 15.1728 55.4577 14.6457 55.222 14.1918C54.9863 13.7233 54.6548 13.3572 54.2275 13.0937C53.815 12.8302 53.3362 12.6984 52.7911 12.6984C52.2607 12.6984 51.7819 12.8302 51.3547 13.0937C50.9421 13.3572 50.618 13.7233 50.3823 14.1918C50.1466 14.6457 50.0287 15.1728 50.0287 15.773C50.0287 16.3733 50.1466 16.9077 50.3823 17.3763C50.618 17.8301 50.9495 18.1888 51.3768 18.4524C51.804 18.7159 52.2902 18.8477 52.8353 18.8477Z"></path><path d="M12.5786 0C11.6253 2.46943 10.6536 5.03986 8.57466 7.00774C9.21998 6.80573 10.3493 6.62461 11.0753 6.64203V17.0283L7.988 17.4636C7.878 17.4532 7.84133 17.2895 7.84133 17.0666C7.54434 13.8413 6.74135 11.1316 5.81736 8.32779C5.75136 7.94466 4.58171 6.48181 5.4837 6.73955C5.5937 6.75348 6.80002 7.2202 6.60935 6.99729C4.96671 5.38119 2.56508 4.21788 0.233112 3.87306C0.0277812 3.8243 -0.0932171 3.92183 0.0901136 4.14822C3.18474 8.6726 5.77336 14.012 5.75136 20.3475C6.95401 20.3475 9.86897 19.6718 11.0753 19.6718V27H12.5969L12.9453 6.53406L12.5786 0Z"></path><path d="M12.5786 0C13.5319 2.46943 14.5036 5.03986 16.5825 7.00774C15.9372 6.80573 14.8079 6.62461 14.0819 6.64203V17.0283L17.1692 17.4636C17.2792 17.4532 17.3159 17.2895 17.3159 17.0666C17.6129 13.8413 18.4158 11.1316 19.3398 8.32779C19.4058 7.94466 20.5755 6.48181 19.6735 6.73955C19.5635 6.75348 18.3572 7.2202 18.5478 6.99729C20.1905 5.38119 22.5921 4.21788 24.9241 3.87306C25.1294 3.8243 25.2504 3.92183 25.0671 4.14822C21.9725 8.6726 19.3838 14.012 19.4058 20.3475C18.2032 20.3475 15.2882 19.6718 14.0819 19.6718V27H12.5603L12.2119 6.53406L12.5786 0Z"></path></g></svg>

      <p>&copy; 2024 Government of Barbados. All rights reserved.</p>
      <div class="flex gap-4">
        <a href="#" class="underline underline-offset-2 hover:no-underline text-bb-white-00">Privacy</a>
        <a href="#" class="underline underline-offset-2 hover:no-underline text-bb-white-00">Terms</a>

<script src="/assets/govbb-framework.js"></script>
<script>
const FORM_NAME = 'Termination of Services / Layoff Certificate';

function getFlow() {
  return ['start','employee-details','employer-details','termination-type','employment-details','evidence-questions','declaration','check','confirmation'];
}

const PAGES = {
  'start': () => `
    <div class="space-y-8">
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Issue a termination of services certificate to your employee</h1>
      <p class="text-[1.25rem]">By law, you must give your employee a Termination of Services Certificate when their employment ends. You must also send a copy to NIS within one week.</p>
      <div class="bg-bb-red-10 border-2 border-bb-red-00 rounded-md p-4">
        <p class="font-bold text-bb-red-00">Legal requirement</p>
        <p>Failure to issue this certificate is an offence. The fine is up to <strong>$1,000</strong>.</p>
      </div>
      <div class="bg-bb-blue-10 border-l-4 border-bb-blue-40 p-4">
        <p class="font-bold">Three copies are required</p>
        <p>One copy for the employee, one copy sent to NIS, and one copy for your own records.</p>
      </div>
      <div>
        <h2 class="font-bold text-[1.5rem] mb-4">What you will need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
          <li>The employee's NIS number and National Registration Number</li>
          <li>The employee's address and contact details</li>
          <li>Your employer registration number</li>
          <li>Employment start and end dates</li>
          <li>Reason for termination</li>
        </ul>
      </div>
      ${GovBB.startBtn()}
    </div>`,

  'employee-details': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Employee details</h1>
      <div class="space-y-8">
        ${GovBB.textField('emp-last-name', 'Employee\'s last name')}
        ${GovBB.textField('emp-first-name', 'Employee\'s first name')}
        ${GovBB.textField('emp-middle-name', 'Employee\'s middle name(s)', { hint: 'Optional' })}
        ${GovBB.textField('emp-nrn', 'Employee\'s National Registration Number (NRN)', { hint: 'For example, 870315-1234' })}
        ${GovBB.textField('emp-nis-number', 'Employee\'s NIS number', { hint: '6-digit National Insurance number', inputmode: 'numeric', maxlength: '6' })}
        ${GovBB.textField('emp-street', 'Employee\'s street address')}
        ${GovBB.textField('emp-district', 'District', { hint: 'Optional' })}
        ${GovBB.selectField('emp-parish', 'Parish', GovBB.PARISHES)}
        ${GovBB.textField('emp-postal', 'Postal code', { hint: 'For example, BB11000' })}
        ${GovBB.telField('emp-telephone', 'Telephone number', { hint: 'Include area code', placeholder: '246-555-1234' })}
        ${GovBB.telField('emp-cell', 'Mobile number', { hint: 'Optional', placeholder: '246-555-1234' })}
        ${GovBB.emailField('emp-email', 'Email address', { hint: 'Optional' })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'employer-details': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your employer details</h1>
      <div class="space-y-8">
        ${GovBB.textField('employer-name', 'Name of employer / business')}
        ${GovBB.textField('employer-reg', 'Employer registration number', { hint: 'Your NIS employer registration number' })}
        ${GovBB.textField('employer-street', 'Street address')}
        ${GovBB.textField('employer-district', 'District', { hint: 'Optional' })}
        ${GovBB.selectField('employer-parish', 'Parish', GovBB.PARISHES)}
        ${GovBB.textField('employer-postal', 'Postal code', { hint: 'For example, BB11000' })}
        ${GovBB.telField('employer-telephone', 'Telephone number', { hint: 'Include area code', placeholder: '246-555-1234' })}
        ${GovBB.telField('employer-fax', 'Fax number', { hint: 'Optional' })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'termination-type': () => {
    var D = GovBB.D;
    var isLabourDispute = D['labour-dispute'] === 'Yes';
    return `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">How did the employment end?</h1>
      <div class="space-y-8">
        ${GovBB.radioGroup('voluntary', 'Did the employee voluntarily leave?', ['Yes', 'No'], { hint: 'For example, they resigned or retired.' })}
        ${GovBB.radioGroup('labour-dispute', 'Is this related to a labour dispute?', ['Yes', 'No'])}
        ${isLabourDispute ? GovBB.radioGroup('on-strike', 'Is or was the employee on strike?', ['Yes', 'No']) : ''}
        ${GovBB.continueBtn()}
      </div>
    </form>`;
  },

  'employment-details': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Employment dates</h1>
      <div class="space-y-8">
        ${GovBB.textField('occupation', 'Employee\'s occupation or job title')}
        ${GovBB.textField('position', 'Employee\'s position within the organisation', { hint: 'For example, Senior Sales Associate' })}
        ${GovBB.dateField('date-commenced', 'Date employment started')}
        ${GovBB.dateField('last-day-work', 'Last day at work')}
        ${GovBB.dateField('date-termination', 'Date of termination')}
        ${GovBB.dateField('last-day-paid', 'Last day for which employee will be paid')}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'evidence-questions': () => {
    var D = GovBB.D;
    var isVoluntary = D['voluntary'] === 'Yes';
    var isLabourDispute = D['labour-dispute'] === 'Yes';
    var isLayoff = D['layoff'] === 'Yes';
    var isHolidayPay = D['holiday-pay'] === 'Yes';
    var isPension = D['employer-pension'] === 'Yes';
    var isMisconduct = D['misconduct'] === 'Yes';

    return `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Additional details</h1>
      <div class="space-y-8">

        ${!isVoluntary && !isLabourDispute ? `
          ${GovBB.radioGroup('layoff', 'Was the employee laid off (temporary)?', ['Yes', 'No'], { hint: 'A layoff is when you expect the employee to return to work.' })}
          ${isLayoff ? `
            <div class="bg-bb-blue-10 p-4 rounded-md space-y-4">
              <p class="font-bold">Layoff details</p>
              ${GovBB.dateField('layoff-date', 'Date of layoff')}
              ${GovBB.dateField('reemployment-date', 'Expected date of re-employment', 'Optional — leave blank if unknown. For example, 27 03 2026')}
            </div>` : ''}
        ` : ''}

        ${!isVoluntary ? `
          ${GovBB.radioGroup('misconduct', 'Was the employee dismissed for misconduct?', ['Yes', 'No'])}
          ${isMisconduct ? GovBB.textareaField('misconduct-details', 'Describe the misconduct', { hint: 'Give details of the reason for dismissal.', rows: 4 }) : ''}
        ` : ''}

        ${GovBB.radioGroup('employer-pension', 'Is the employee receiving a pension from you (the employer)?', ['Yes', 'No'])}
        ${isPension ? GovBB.dateField('pension-start', 'Pension start date') : ''}

        ${isLayoff || (!isVoluntary && !isLabourDispute) ? `
          ${GovBB.radioGroup('holiday-pay', 'Is the employee receiving payment for outstanding holiday?', ['Yes', 'No'])}
          ${isHolidayPay ? `
            <div class="bg-bb-blue-10 p-4 rounded-md space-y-4">
              <p class="font-bold">Holiday pay details</p>
              ${GovBB.dateField('holiday-from', 'Holiday pay — from date')}
              ${GovBB.dateField('holiday-to', 'Holiday pay — to date')}
              ${GovBB.textField('holiday-amount', 'Holiday pay amount (BDS$)', { inputmode: 'decimal' })}
            </div>` : ''}
        ` : ''}

        ${isLabourDispute ? GovBB.textareaField('labour-dispute-details', 'Describe the labour dispute', { hint: 'Give relevant details about the dispute.', rows: 4 }) : ''}

        ${GovBB.textareaField('other-details', 'Any other relevant details', { hint: 'Optional — add any other information that may be relevant.', rows: 3 })}

        ${GovBB.continueBtn()}
      </div>
    </form>`;
  },

  'declaration': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Declaration</h1>
      <div class="space-y-8">
        <div class="space-y-2 mb-6">
          <p class="text-[1.25rem]"><span class="font-bold">Authorised signatory:</span> ${GovBB.D['signatory-name'] || '—'}</p>
          <p class="text-[1.25rem]"><span class="font-bold">Date:</span> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
        </div>
        <div class="bg-bb-blue-10 border-l-4 border-bb-blue-40 p-6">
          <p class="text-[1.25rem]">I declare that the information given in this certificate is true and correct to the best of my knowledge and belief.</p>
        </div>
        <div class="bg-bb-red-10 border-2 border-bb-red-00 rounded-md p-4">
          <p class="font-bold text-bb-red-00 text-[1.25rem]">WARNING</p>
          <p class="text-[1.25rem]">Giving false information may result in prosecution.</p>
        </div>
        ${GovBB.checkboxItem('declaration-agree', 'I confirm that the information I have given is true and complete to the best of my knowledge.')}
        <div class="mt-8 flex gap-4">
          <button type="button" onclick="back()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-colors duration-200 outline-none bg-bb-grey-00 text-bb-black-00 hover:bg-[#c5ccd4] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Back</button>
          <button type="button" onclick="next()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] hover:shadow-[inset_0_0_0_4px_rgba(222,245,246,0.10)] active:bg-[#0a4549] active:shadow-[inset_0_0_0_3px_rgba(0,0,0,0.20)] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Submit certificate</button>
        </div>
      </div>
    </form>`,

  'check': () => {
    var D = GovBB.D;
    var empName = [D['emp-first-name'], D['emp-middle-name'], D['emp-last-name']].filter(Boolean).join(' ');
    var isVoluntary = D['voluntary'] === 'Yes';
    var isLayoff = D['layoff'] === 'Yes';
    var isMisconduct = D['misconduct'] === 'Yes';
    var isPension = D['employer-pension'] === 'Yes';
    var isHolidayPay = D['holiday-pay'] === 'Yes';
    var isLabourDispute = D['labour-dispute'] === 'Yes';
    return `
    ${GovBB.backLink()}
    <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Check your answers</h1>
    <div class="space-y-8">
      <h2 class="font-bold text-[1.5rem]">Employee details</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Name', empName, 'employee-details')}
        ${GovBB.summaryRow('NIS number', D['emp-nis-number'], 'employee-details')}
        ${GovBB.summaryRow('NRN', D['emp-nrn'], 'employee-details')}
        ${GovBB.summaryRow('Address', [D['emp-street'], D['emp-parish'], D['emp-postal']].filter(Boolean).join(', '), 'employee-details')}
      </dl>
      <h2 class="font-bold text-[1.5rem]">Employer details</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Employer name', D['employer-name'], 'employer-details')}
        ${GovBB.summaryRow('Registration number', D['employer-reg'], 'employer-details')}
        ${GovBB.summaryRow('Address', [D['employer-street'], D['employer-parish']].filter(Boolean).join(', '), 'employer-details')}
      </dl>
      <h2 class="font-bold text-[1.5rem]">Termination type</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Voluntary leaving', D['voluntary'], 'termination-type')}
        ${GovBB.summaryRow('Labour dispute', D['labour-dispute'], 'termination-type')}
        ${isLabourDispute ? GovBB.summaryRow('On strike', D['on-strike'], 'termination-type') : ''}
      </dl>
      <h2 class="font-bold text-[1.5rem]">Employment dates</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Occupation', D['occupation'], 'employment-details')}
        ${GovBB.summaryRow('Date employment started', [D['date-commenced-day'],D['date-commenced-month'],D['date-commenced-year']].filter(Boolean).join('/'), 'employment-details')}
        ${GovBB.summaryRow('Last day at work', [D['last-day-work-day'],D['last-day-work-month'],D['last-day-work-year']].filter(Boolean).join('/'), 'employment-details')}
        ${GovBB.summaryRow('Date of termination', [D['date-termination-day'],D['date-termination-month'],D['date-termination-year']].filter(Boolean).join('/'), 'employment-details')}
      </dl>
      <h2 class="font-bold text-[1.5rem]">Additional details</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${!isVoluntary && !isLabourDispute ? GovBB.summaryRow('Layoff', D['layoff'], 'evidence-questions') : ''}
        ${!isVoluntary ? GovBB.summaryRow('Misconduct', D['misconduct'], 'evidence-questions') : ''}
        ${isMisconduct ? GovBB.summaryRow('Misconduct details', D['misconduct-details'], 'evidence-questions') : ''}
        ${GovBB.summaryRow('Employer pension', D['employer-pension'], 'evidence-questions')}
        ${isLayoff ? GovBB.summaryRow('Holiday pay', D['holiday-pay'], 'evidence-questions') : ''}
        ${D['other-details'] ? GovBB.summaryRow('Other details', D['other-details'], 'evidence-questions') : ''}
      </dl>
      ${GovBB.continueBtn('Submit Certificate')}
    </div>`;
  },

  'confirmation': () => `
    <div class="space-y-8">
      <div class="bg-bb-teal-00 text-bb-white-00 p-8 rounded-sm space-y-4">
        <h1 class="font-bold text-[3.5rem] leading-[1.15]">Certificate submitted</h1>
        <p class="text-[1.5rem]">Your reference number</p>
        <p class="text-[2rem] font-bold">${window.__refNumber || 'TC-' + Math.random().toString(36).substring(2, 8).toUpperCase()}</p>
      </div>
      <div class="bg-bb-yellow-10 border-l-4 border-bb-yellow-00 p-4">
        <p class="font-bold">Action required — three copies needed</p>
        <ul class="list-disc pl-6 mt-2 space-y-1">
          <li><strong>Copy 1:</strong> Give to the employee immediately</li>
          <li><strong>Copy 2:</strong> Send to NIS within one week</li>
          <li><strong>Copy 3:</strong> Keep for your own records</li>
        </ul>
      </div>
      <h2 class="font-bold text-[1.5rem]">What happens next</h2>
      <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
        <li>Download and print the certificate below.</li>
        <li>Give a copy to your employee so they can claim unemployment benefit if eligible.</li>
        <li>Send a copy to NIS within one week of the termination date.</li>
      </ul>
      <div class="mt-8 flex gap-4">
        <button type="button" class="${GovBB.BTN_CLS}" onclick="alert('In the live service, a PDF would download here.')">Download certificate (PDF)</button>
      </div>
      <p class="text-[1.25rem]"><a href="#" onclick="GovBB.nav('start')" class="${GovBB.LINK_CLS}">Return to start</a></p>
    </div>`
};

function validate(pageId) {
  var D = GovBB.D;
  var errors = [];
  if (pageId === 'employee-details') {
    if (!D['emp-last-name']) errors.push({ id: 'emp-last-name', msg: 'Last name – Enter the employee\'s last name' });
    if (!D['emp-first-name']) errors.push({ id: 'emp-first-name', msg: 'First name – Enter the employee\'s first name' });
    if (!D['emp-nrn']) errors.push({ id: 'emp-nrn', msg: 'NRN – Enter the employee\'s National Registration Number' });
    if (!D['emp-nis-number']) errors.push({ id: 'emp-nis-number', msg: 'NIS number – Enter the employee\'s NIS number' });
    if (!D['emp-street']) errors.push({ id: 'emp-street', msg: 'Street address – Enter the employee\'s address' });
    if (!D['emp-parish']) errors.push({ id: 'emp-parish', msg: 'Parish – Select the employee\'s parish' });
  }
  if (pageId === 'employer-details') {
    if (!D['employer-name']) errors.push({ id: 'employer-name', msg: 'Employer name – Enter your business name' });
    if (!D['employer-reg']) errors.push({ id: 'employer-reg', msg: 'Registration number – Enter your employer registration number' });
    if (!D['employer-street']) errors.push({ id: 'employer-street', msg: 'Street address – Enter your street address' });
    if (!D['employer-parish']) errors.push({ id: 'employer-parish', msg: 'Parish – Select your parish' });
  }
  if (pageId === 'termination-type') {
    if (!D['voluntary']) errors.push({ id: 'voluntary', msg: 'Voluntary leaving – Select Yes or No' });
    if (!D['labour-dispute']) errors.push({ id: 'labour-dispute', msg: 'Labour dispute – Select Yes or No' });
  }
  if (pageId === 'employment-details') {
    if (!D['occupation']) errors.push({ id: 'occupation', msg: 'Occupation – Enter the employee\'s occupation' });
    if (!D['date-commenced-day'] || !D['date-commenced-month'] || !D['date-commenced-year']) errors.push({ id: 'date-commenced-day', msg: 'Date employment started – Enter a complete date' });
    if (!D['last-day-work-day'] || !D['last-day-work-month'] || !D['last-day-work-year']) errors.push({ id: 'last-day-work-day', msg: 'Last day at work – Enter a complete date' });
    if (!D['date-termination-day'] || !D['date-termination-month'] || !D['date-termination-year']) errors.push({ id: 'date-termination-day', msg: 'Date of termination – Enter a complete date' });
  }
  if (pageId === 'evidence-questions') {
    if (!D['employer-pension']) errors.push({ id: 'employer-pension', msg: 'Employer pension – Select Yes or No' });
  }
  if (pageId === 'declaration') {
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: ['start','employee-details','employer-details','termination-type','employment-details','evidence-questions','declaration','check','confirmation'],
  pages: PAGES,
  validate: validate,
  getFlow: getFlow,
  onRadioChange: function(name) {
    var rerenderOn = ['voluntary','labour-dispute','on-strike','layoff','misconduct','employer-pension','holiday-pay'];
    if (rerenderOn.indexOf(name) !== -1) GovBB.render();
  }
});
</script>
</body>
</html>
