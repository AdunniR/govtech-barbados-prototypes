<script src="../assets/govbb-framework.js"></script>
<script>
const FORM_NAME = 'Claim for Unemployment Benefit';

const REASON_OPTIONS = [
  'Redundancy', 'Retrenchment', 'Expiry of contract', 'Closure of business',
  'Resignation due to constructive dismissal', 'End of seasonal employment', 'Other'
];

function getEmploymentRows() {
  return GovBB.D['employment-rows'] || [];
}
function saveEmploymentRows(rows) { GovBB.D['employment-rows'] = rows; }

function addEmploymentRow() {
  var rows = getEmploymentRows();
  rows.push({ employer: '', address: '', dateStarted: '', dateEnded: '', occupation: '', reason: '' });
  saveEmploymentRows(rows);
  GovBB.render();
}
function removeEmploymentRow(i) {
  var rows = getEmploymentRows();
  rows.splice(i, 1);
  saveEmploymentRows(rows);
  GovBB.render();
}
function updateEmpRow(i, field, value) {
  var rows = getEmploymentRows();
  rows[i][field] = value;
  saveEmploymentRows(rows);
}

function renderEmploymentRows() {
  var rows = getEmploymentRows();
  if (!rows.length) return '<p class="text-bb-mid-grey-00">No additional employers added yet.</p>';
  return rows.map(function(row, i) {
    return `<div class="repeat-row">
      <div class="flex justify-between items-start mb-4">
        <p class="font-bold">Employer ${i + 1}</p>
        <button type="button" onclick="removeEmploymentRow(${i})" class="text-bb-red-00 underline text-[1rem] hover:text-bb-black-00">Remove</button>
      </div>
      <div class="space-y-4">
        <div class="field-group flex flex-col gap-xs">
          <label class="font-bold text-[1.25rem]">Employer name</label>
          <div class="input-wrap ${GovBB.INPUT_WRAP_CLS}">
            <input type="text" class="${GovBB.INPUT_CLS}" value="${row.employer||''}" oninput="updateEmpRow(${i},'employer',this.value)">
          </div>
        </div>
        <div class="field-group flex flex-col gap-xs">
          <label class="font-bold text-[1.25rem]">Employer address</label>
          <div class="input-wrap ${GovBB.INPUT_WRAP_CLS}">
            <input type="text" class="${GovBB.INPUT_CLS}" value="${row.address||''}" oninput="updateEmpRow(${i},'address',this.value)">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="field-group flex flex-col gap-xs">
            <label class="font-bold text-[1.25rem]">Date started</label>
            <div class="input-wrap ${GovBB.INPUT_WRAP_CLS}">
              <input type="text" placeholder="DD/MM/YYYY" class="${GovBB.INPUT_CLS}" value="${row.dateStarted||''}" oninput="updateEmpRow(${i},'dateStarted',this.value)">
            </div>
          </div>
          <div class="field-group flex flex-col gap-xs">
            <label class="font-bold text-[1.25rem]">Date ended</label>
            <div class="input-wrap ${GovBB.INPUT_WRAP_CLS}">
              <input type="text" placeholder="DD/MM/YYYY" class="${GovBB.INPUT_CLS}" value="${row.dateEnded||''}" oninput="updateEmpRow(${i},'dateEnded',this.value)">
            </div>
          </div>
        </div>
        <div class="field-group flex flex-col gap-xs">
          <label class="font-bold text-[1.25rem]">Occupation</label>
          <div class="input-wrap ${GovBB.INPUT_WRAP_CLS}">
            <input type="text" class="${GovBB.INPUT_CLS}" value="${row.occupation||''}" oninput="updateEmpRow(${i},'occupation',this.value)">
          </div>
        </div>
        <div class="field-group flex flex-col gap-xs">
          <label class="font-bold text-[1.25rem]">Reason for leaving</label>
          <div class="input-wrap ${GovBB.INPUT_WRAP_CLS}">
            <input type="text" class="${GovBB.INPUT_CLS}" value="${row.reason||''}" oninput="updateEmpRow(${i},'reason',this.value)">
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

const PAGES = {
  'start': () => `
    <div class="space-y-8">
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Claim for Unemployment Benefit</h1>
      <p class="text-[1.25rem]">Use this form to claim NIS unemployment benefit if you have lost your job through no fault of your own.</p>
      <div class="bg-bb-yellow-10 border-l-4 border-bb-yellow-00 p-4">
        <p class="font-bold">Before you start</p>
        <p>You must have a Termination of Services Certificate from your employer. You cannot submit this claim without one.</p>
      </div>
      <div>
        <h2 class="font-bold text-[1.5rem] mb-4">What you will need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
          <li>Your Termination of Services Certificate</li>
          <li>Your NIS number and National Registration Number</li>
          <li>Details of your last employer</li>
          <li>Your employment history for the last 52 weeks</li>
          <li>Your bank account details (if you want direct deposit)</li>
        </ul>
      </div>
      ${GovBB.startBtn()}
    </div>`,

  'applicant-details': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your personal details</h1>
      <div class="space-y-8">
        ${GovBB.textField('surname', 'Surname')}
        ${GovBB.textField('first-name', 'First name')}
        ${GovBB.textField('middle-name', 'Middle name(s)', { hint: 'Optional' })}
        ${GovBB.textField('nis-number', 'NIS number', { hint: 'Your 6-digit National Insurance number', inputmode: 'numeric', maxlength: '6' })}
        ${GovBB.textField('nrn', 'National Registration Number (NRN)', { hint: 'For example, 870315-1234' })}
        ${GovBB.textField('street-address', 'Street address')}
        ${GovBB.textField('district', 'District', { hint: 'Optional' })}
        ${GovBB.selectField('parish', 'Parish', GovBB.PARISHES)}
        ${GovBB.textField('postal-code', 'Postal code', { hint: 'For example, BB11000' })}
        ${GovBB.telField('telephone', 'Telephone number', { hint: 'Include area code', placeholder: '246-555-1234' })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'eligibility': () => {
    var D = GovBB.D;
    var showB1name = D['b1'] === 'Yes';
    var showB2name = D['b2'] === 'Yes';
    var b6No = D['b6'] === 'No';
    return `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Check your eligibility</h1>
      <div class="space-y-8">
        ${GovBB.radioGroup('b1', 'B1. Are you currently receiving any other NIS benefit?', ['Yes', 'No'])}
        ${showB1name ? GovBB.textField('b1-benefit-name', 'Name of benefit you are receiving') : ''}
        ${GovBB.radioGroup('b2', 'B2. Have you received any NIS benefit in the last 52 weeks?', ['Yes', 'No'])}
        ${showB2name ? GovBB.textField('b2-benefit-name', 'Name of benefit you received') : ''}
        ${GovBB.radioGroup('b3', 'B3. Are you available for and seeking work?', ['Yes', 'No'])}
        ${GovBB.radioGroup('b4', 'B4. Are you capable of working?', ['Yes', 'No'])}
        ${GovBB.radioGroup('b5', 'B5. Have you registered as unemployed at the Employment Bureau?', ['Yes', 'No'])}
        ${GovBB.radioGroup('b6', 'B6. Did you lose your job through no fault of your own?', ['Yes', 'No'])}
        ${b6No ? `<div class="bg-bb-yellow-10 border-l-4 border-bb-yellow-00 p-4">
          <p class="font-bold">You may not be eligible</p>
          <p>Unemployment benefit is for people who lost their job through no fault of their own. NIS will review your claim and contact you if more information is needed.</p>
        </div>` : ''}
        ${GovBB.continueBtn()}
      </div>
    </form>`;
  },

  'employment-history': () => {
    var D = GovBB.D;
    var pilWeeks = parseInt(D['pil-weeks']) || 0;
    var showPilDates = pilWeeks > 0;
    var showReasonOther = D['reason-unemployment'] === 'Other';
    return `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your last job</h1>
      <div class="space-y-8">
        ${GovBB.textField('last-employer-name', 'Name of last employer')}
        ${GovBB.textField('last-employer-address', 'Employer\'s address')}
        ${GovBB.textField('occupation', 'Your occupation or job title')}
        ${GovBB.dateField('date-commenced', 'Date you started this job')}
        ${GovBB.dateField('last-day-work', 'Last day you worked')}
        ${GovBB.dateField('last-day-paid', 'Last day for which you were paid')}
        ${GovBB.textField('pil-weeks', 'Payment in lieu of notice — number of weeks', { hint: 'Enter 0 if you did not receive payment in lieu of notice', inputmode: 'numeric' })}
        ${showPilDates ? `
          <div class="bg-bb-blue-10 p-4 rounded-md space-y-4">
            <p class="font-bold">Payment in lieu of notice dates</p>
            ${GovBB.dateField('pil-from', 'Payment in lieu — from date')}
            ${GovBB.dateField('pil-to', 'Payment in lieu — to date')}
          </div>` : ''}
        ${GovBB.selectField('reason-unemployment', 'Reason for unemployment', REASON_OPTIONS)}
        ${showReasonOther ? GovBB.textField('reason-unemployment-other', 'Please describe the reason') : ''}
        ${GovBB.continueBtn()}
      </div>
    </form>`;
  },

  'other-employment': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Other employment in the last 52 weeks</h1>
      <p class="text-[1.25rem] text-bb-mid-grey-00 mb-8">Add details of any other employers you worked for in the 52 weeks before you became unemployed.</p>
      <div class="space-y-8">
        ${renderEmploymentRows()}
        <button type="button" onclick="addEmploymentRow()" class="inline-flex items-center gap-2 text-[1.25rem] text-bb-teal-00 underline hover:text-bb-black-00 hover:no-underline">+ Add an employer</button>
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  'declaration': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Declaration</h1>
      <div class="space-y-8">
        <div class="space-y-2 mb-6">
          <p class="text-[1.25rem]"><span class="font-bold">Applicant's name:</span> ${[GovBB.D['first-name'], GovBB.D['middle-name'], GovBB.D['surname']].filter(Boolean).join(' ') || '—'}</p>
          <p class="text-[1.25rem]"><span class="font-bold">Date:</span> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
        </div>
        <div class="bg-bb-blue-10 border-l-4 border-bb-blue-40 p-6">
          <p class="text-[1.25rem]">I declare that the information provided is true and correct. I understand that NIS may verify the information with my employer(s). I will report any change in my circumstances that may affect my entitlement to benefit.</p>
          <p class="text-[1.25rem] mt-4 font-bold text-bb-red-00">Warning: Giving false information may result in prosecution and repayment of any benefit received.</p>
        </div>
        ${GovBB.checkboxItem('declaration-agree', 'I confirm that the information I have given is true and complete to the best of my knowledge.')}
        <div class="mt-8 flex gap-4">
          <button type="button" onclick="back()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-colors duration-200 outline-none bg-bb-grey-00 text-bb-black-00 hover:bg-[#c5ccd4] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Back</button>
          <button type="button" onclick="next()" class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] hover:shadow-[inset_0_0_0_4px_rgba(222,245,246,0.10)] active:bg-[#0a4549] active:shadow-[inset_0_0_0_3px_rgba(0,0,0,0.20)] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">Submit claim</button>
        </div>
      </div>
    </form>`,

  'check': () => {
    var D = GovBB.D;
    var pilWeeks = parseInt(D['pil-weeks']) || 0;
    var rows = getEmploymentRows();
    var empHistHtml = rows.length ? rows.map(function(row, i) {
      return GovBB.summaryRow('Employer ' + (i+1), [row.employer, row.dateStarted + ' – ' + row.dateEnded].filter(Boolean).join(', '), 'other-employment');
    }).join('') : GovBB.summaryRow('Other employers', 'None added', 'other-employment');
    return `
    ${GovBB.backLink()}
    <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Check your answers</h1>
    <div class="space-y-8">
      <h2 class="font-bold text-[1.5rem]">Personal details</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Surname', D['surname'], 'applicant-details')}
        ${GovBB.summaryRow('First name', D['first-name'], 'applicant-details')}
        ${GovBB.summaryRow('NIS number', D['nis-number'], 'applicant-details')}
        ${GovBB.summaryRow('NRN', D['nrn'], 'applicant-details')}
        ${GovBB.summaryRow('Address', [D['street-address'], D['parish'], D['postal-code']].filter(Boolean).join(', '), 'applicant-details')}
        ${GovBB.summaryRow('Telephone', D['telephone'], 'applicant-details')}
      </dl>
      <h2 class="font-bold text-[1.5rem]">Eligibility</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Currently receiving benefit', D['b1'], 'eligibility')}
        ${GovBB.summaryRow('Available for work', D['b3'], 'eligibility')}
        ${GovBB.summaryRow('Capable of working', D['b4'], 'eligibility')}
        ${GovBB.summaryRow('Registered at Employment Bureau', D['b5'], 'eligibility')}
        ${GovBB.summaryRow('Lost job through no fault of own', D['b6'], 'eligibility')}
      </dl>
      <h2 class="font-bold text-[1.5rem]">Last employer</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
        ${GovBB.summaryRow('Employer name', D['last-employer-name'], 'employment-history')}
        ${GovBB.summaryRow('Occupation', D['occupation'], 'employment-history')}
        ${GovBB.summaryRow('Date started', [D['date-commenced-day'], D['date-commenced-month'], D['date-commenced-year']].filter(Boolean).join('/'), 'employment-history')}
        ${GovBB.summaryRow('Last day worked', [D['last-day-work-day'], D['last-day-work-month'], D['last-day-work-year']].filter(Boolean).join('/'), 'employment-history')}
        ${GovBB.summaryRow('Reason for unemployment', D['reason-unemployment'] === 'Other' ? D['reason-unemployment-other'] : D['reason-unemployment'], 'employment-history')}
        ${pilWeeks > 0 ? GovBB.summaryRow('Payment in lieu (weeks)', String(pilWeeks), 'employment-history') : ''}
      </dl>
      <h2 class="font-bold text-[1.5rem]">Other employment (last 52 weeks)</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">${empHistHtml}</dl>
      ${GovBB.continueBtn('Submit Claim')}
    </div>`;
  },

  'confirmation': () => `
    <div class="space-y-8">
      <div class="bg-bb-teal-00 text-bb-white-00 p-8 rounded-sm space-y-4">
        <h1 class="font-bold text-[3.5rem] leading-[1.15]">Claim submitted</h1>
        <p class="text-[1.5rem]">Your reference number</p>
        <p class="text-[2rem] font-bold">${window.__refNumber || 'UB-' + Math.random().toString(36).substring(2, 8).toUpperCase()}</p>
      </div>
      <div class="bg-bb-yellow-10 border-l-4 border-bb-yellow-00 p-4">
        <p class="font-bold">You must attend an interview</p>
        <p>We will contact you within 5 working days to arrange an interview at the NIS office. Bring your Termination Certificate, ID, and this reference number.</p>
      </div>
      <h2 class="font-bold text-[1.5rem]">What to bring to your interview</h2>
      <ul class="list-disc pl-6 space-y-2 text-[1.25rem]">
        <li>Termination of Services Certificate from your employer</li>
        <li>National ID card or passport</li>
        <li>Your NIS card or number</li>
        <li>Bank account details (if you want direct deposit)</li>
        <li>This reference number: <strong>${window.__refNumber || 'UB-XXXXXX'}</strong></li>
      </ul>
      <p class="text-[1.25rem]"><a href="#" onclick="GovBB.nav('start')" class="${GovBB.LINK_CLS}">Return to start</a></p>
    </div>`
};

function validate(pageId) {
  var D = GovBB.D;
  var errors = [];
  if (pageId === 'applicant-details') {
    if (!D['surname']) errors.push({ id: 'surname', msg: 'Surname – Enter your surname' });
    if (!D['first-name']) errors.push({ id: 'first-name', msg: 'First name – Enter your first name' });
    if (!D['nis-number']) errors.push({ id: 'nis-number', msg: 'NIS number – Enter your NIS number' });
    if (!D['nrn']) errors.push({ id: 'nrn', msg: 'NRN – Enter your National Registration Number' });
    if (!D['street-address']) errors.push({ id: 'street-address', msg: 'Street address – Enter your street address' });
    if (!D['parish']) errors.push({ id: 'parish', msg: 'Parish – Select your parish' });
    if (!D['telephone']) errors.push({ id: 'telephone', msg: 'Telephone – Enter your telephone number' });
  }
  if (pageId === 'eligibility') {
    ['b1','b2','b3','b4','b5','b6'].forEach(function(q) {
      if (!D[q]) errors.push({ id: q, msg: q.toUpperCase() + ' – Please select Yes or No' });
    });
  }
  if (pageId === 'employment-history') {
    if (!D['last-employer-name']) errors.push({ id: 'last-employer-name', msg: 'Employer name – Enter your last employer\'s name' });
    if (!D['occupation']) errors.push({ id: 'occupation', msg: 'Occupation – Enter your occupation' });
    if (!D['last-day-work-day'] || !D['last-day-work-month'] || !D['last-day-work-year']) errors.push({ id: 'last-day-work-day', msg: 'Last day worked – Enter the date you last worked' });
    if (!D['reason-unemployment']) errors.push({ id: 'reason-unemployment', msg: 'Reason – Select the reason for unemployment' });
  }
  if (pageId === 'declaration') {
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: ['start','applicant-details','eligibility','employment-history','other-employment','declaration','check','confirmation'],
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name) {
    if (['b1','b2','b6','reason-unemployment'].indexOf(name) !== -1) GovBB.render();
  }
});
</script>
</body>
</html>
